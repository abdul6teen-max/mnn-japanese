// Build and inject manifest dynamically
function injectManifest() {
  const manifest = {
    name: "日本語",
    short_name: "日本語",
    description: "Minna no Nihongo flashcard app",
    start_url: "./",
    display: "standalone",
    background_color: "#ffffff",
    theme_color: "#ffffff",
    orientation: "portrait",
    icons: [
      { src: ICON_192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: ICON_512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: "application/manifest+json"});
  const url = URL.createObjectURL(blob);
  document.getElementById("pwa-manifest").setAttribute("href", url);
  document.getElementById("apple-icon").setAttribute("href", ICON_192);
}
document.addEventListener("DOMContentLoaded", injectManifest);

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcXH5v8dhJA3YgUEik_od2Q9Ck34TYLsA",
  authDomain: "mnn-japanese.firebaseapp.com",
  projectId: "mnn-japanese",
  storageBucket: "mnn-japanese.firebasestorage.app",
  messagingSenderId: "4772966146",
  appId: "1:4772966146:web:f37f3fe22e7b5e41c71c1b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._fbLoad = async (name) => {
  try {
    const snap = await getDoc(doc(db, "profiles", name));
    return snap.exists() ? snap.data().state : null;
  } catch(e) { console.error("Load error", e); return null; }
};
window._fbSave = async (name, data) => {
  try {
    await setDoc(doc(db, "profiles", name), { state: data });
  } catch(e) { console.error("Save error", e); }
};
window._fbReady = true;
window.dispatchEvent(new Event("fbready"));
</script>

.theme-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.theme-toggle-track{width:36px;height:20px;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;}
.theme-toggle-thumb{width:14px;height:14px;border-radius:7px;background:#fff;position:absolute;top:3px;transition:left .2s;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow-x:hidden;}body{overscroll-behavior:none;}
#app{min-height:100%;display:flex;flex-direction:column;background:var(--bg);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.btn{transition:all .13s ease;cursor:pointer;user-select:none;}
.btn:hover{filter:brightness(1.12);}
.btn:active{transform:scale(0.97);}
.nav-tab{transition:all .15s;cursor:pointer;user-select:none;}
.deck-row{transition:background .1s;cursor:pointer;}
.deck-row:hover{background:var(--surface2)!important;}
.rating-btn{transition:all .13s ease;cursor:pointer;}
.rating-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.rating-btn:active{transform:translateY(0);}
.lesson-chip{transition:all .12s;cursor:pointer;}
.lesson-chip:hover{border-color:var(--accent)!important;}
.lesson-chip.sel{background:rgba(77,157,224,0.18)!important;border-color:var(--accent)!important;color:#7ec8f4!important;}
.card-wrap{perspective:1000px;}
.card-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateX(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;}
.card-back-face{transform:rotateX(180deg);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease;}
@keyframes pop{0%{transform:scale(.96)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:slideIn .3s ease;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;}
input[type=date]{color-scheme:dark;}
.toggle-track{width:44px;height:24px;border-radius:12px;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0;}
.toggle-thumb{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left .2s;}
</style>

// ── FSRS-4.5 ──────────────────────────────────────────────────────────────────
const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0070,1.9395,0.1100,0.2900,2.2700,0.2500,2.9898,0.5100,0.8360];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1;
function fsrsIS(r){return Math.max(W[r-1],0.1);}
function fsrsID(r){return Math.min(Math.max(W[4]-Math.exp(W[5]*(r-1))+1,1),10);}
function fsrsFC(e,s){return Math.pow(1+FACTOR*e/s,DECAY);}
function fsrsNS(d,s,r,rating){
  if(rating===1)return W[11]*Math.pow(d,-W[12])*(Math.pow(s+1,W[13])-1)*Math.exp(W[14]*(1-r));
  const hp=rating===2?W[15]:1,eb=rating===4?W[16]:1;
  return s*(Math.exp(W[8])*(11-d)*Math.pow(s,-W[9])*(Math.exp(W[10]*(1-r))-1)*hp*eb+1);
}
function fsrsND(d,rating){return Math.min(Math.max(d-W[6]*(rating-3)+W[7]*(W[4]-(d-W[6]*(rating-3))),1),10);}
function fsrsNI(s,ret=0.9){return Math.max(1,Math.round(s/FACTOR*(Math.pow(ret,1/DECAY)-1)));}
function nextFSRS(card,rating){
  const s0=card.stability,now=Date.now();
  if(!s0||card.reps===0){
    const stability=fsrsIS(rating),difficulty=fsrsID(rating);
    return{stability,difficulty,interval:rating===1?0:fsrsNI(stability),reps:rating===1?0:1,lastReview:now};
  }
  const elapsed=Math.max(0,(now-(card.lastReview||now))/86400000);
  const ret=fsrsFC(elapsed,s0);
  const newD=fsrsND(card.difficulty||5,rating),newS=fsrsNS(newD,s0,ret,rating);
  return{stability:Math.max(newS,0.1),difficulty:newD,interval:rating===1?0:fsrsNI(newS),reps:rating===1?0:(card.reps||0)+1,lastReview:now};
}
function previewIntervals(card){return[1,2,3,4].map(r=>fmtDays(nextFSRS(card,r).interval));}
function fmtDays(d){
  if(d===0)return"<10m";if(d===1)return"1d";
  if(d<30)return`${d}d`;if(d<365)return`${Math.round(d/30)}mo`;
  return`${(d/365).toFixed(1)}y`;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function calcDailyNewCap(examDate, masteryTargetDate){
  // If mastery target date set, use that minus 21 days as the effective deadline
  // Otherwise fall back to exam date minus NEW_CARDS_CUTOFF_DAYS
  const today=new Date();today.setHours(0,0,0,0);
  if(masteryTargetDate){
    const target=new Date(masteryTargetDate);target.setHours(0,0,0,0);
    // Cards need ~21 days of reviews after first seen to reach mastery
    // So last new card must be studied 21 days before mastery target
    const activeDays=Math.max(1,Math.round((target-today)/86400000)-NEW_CARDS_CUTOFF_DAYS);
    return Math.max(5,Math.min(40,Math.ceil(997/activeDays)));
  }
  if(!examDate)return 15;
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  const totalDays=Math.max(1,Math.round((exam-today)/86400000));
  const activeDays=Math.max(1,totalDays-NEW_CARDS_CUTOFF_DAYS);
  return Math.max(5,Math.min(30,Math.ceil(997/activeDays)));
}
function daysUntilExam(examDate){
  if(!examDate)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  return Math.round((exam-today)/86400000);
}

function exportData(name,data){
  const blob=new Blob([JSON.stringify({profile:name,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mnn-backup-${name}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(onSuccess){
  const input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.data)onSuccess(parsed.data);
        else alert("Invalid backup file.");
      }catch{alert("Could not read file.");}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Study plan table ─────────────────────────────────────────────────────────
function buildPlanTable(profileData) {
  const { cardStates, settings, dailyLog } = profileData;
  const { selectedLessons, newCardCap } = settings;
  const orderedLessons = [...selectedLessons].sort((a,b)=>parseInt(a.split(' ')[1])-parseInt(b.split(' ')[1]));

  const seenByLesson = {};
  for (const lesson of orderedLessons) {
    seenByLesson[lesson] = (RAW[lesson]||[]).filter((_,i)=>
      (cardStates[cardKey(lesson,i,'rec')]?.reps||0) > 0
    ).length;
  }
  const totalByLesson = {};
  for (const lesson of orderedLessons) totalByLesson[lesson] = RAW[lesson]?.length || 0;

  const studyDates = Object.keys(dailyLog).filter(d=>dailyLog[d].newSeen>0).sort();
  const pastDays = studyDates.map(date => ({
    date, byLesson: dailyLog[date].newByLesson || {}, total: dailyLog[date].newSeen
  }));

  // remaining by lesson (ground truth from cardStates)
  const rem = {};
  for (const lesson of orderedLessons) rem[lesson] = totalByLesson[lesson] - seenByLesson[lesson];

  // build future days
  const todayStr = localDateStr();
  const pastDateSet = new Set(studyDates);
  const futureDays = [];
  const datePtr = new Date(todayStr + 'T00:00:00');

  while (true) {
    const dateStr = localDateStr(datePtr);
    if (!pastDateSet.has(dateStr)) {
      let cap = newCardCap;
      const byLesson = {};
      for (const lesson of orderedLessons) {
        if (cap <= 0) break;
        if ((rem[lesson]||0) <= 0) continue;
        const give = Math.min(rem[lesson], cap);
        byLesson[lesson] = give;
        rem[lesson] -= give;
        cap -= give;
      }
      if (Object.keys(byLesson).length === 0) break;
      futureDays.push({ date: dateStr, byLesson });
    }
    datePtr.setDate(datePtr.getDate() + 1);
    if (futureDays.length > 300) break;
  }

  return { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson };
}

function localDateStr(d) {
  const dt = d || new Date();
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function fmtTableDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return (d.getMonth()+1) + '/' + d.getDate();
}

function renderPlanTable(profileData, accentColor) {
  const { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson } = buildPlanTable(profileData);
  const allDays = [...pastDays, ...futureDays];
  const pastCount = pastDays.length;
  const todayStr = localDateStr();

  if (allDays.length === 0) {
    return '<div style="color:var(--text3);font-size:13px;padding:20px 0;">No cards remaining — all lessons complete!</div>';
  }

  const LABEL_W = 120;
  const COL_W = 60;

  let rows = '';
  for (let li = 0; li < orderedLessons.length; li++) {
    const lesson = orderedLessons[li];
    const total = totalByLesson[lesson];
    const seen = seenByLesson[lesson];
    const done = seen >= total;
    let cells = '';
    for (let i = 0; i < allDays.length; i++) {
      const day = allDays[i];
      const isPast = i < pastCount;
      const val = day.byLesson[lesson] || 0;
      if (!val) {
        cells += '<td style="border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;"></td>';
      } else {
        const color = isPast ? 'var(--good)' : 'var(--accent)';
        cells += '<td style="text-align:center;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;padding:4px 2px;"><span style="font-size:13px;font-weight:500;color:' + color + ';">' + val + '</span></td>';
      }
    }
    const rowBg = li%2===0 ? 'var(--surface)' : 'var(--surface2)';
    rows += '<tr style="background:' + rowBg + ';">'
      + '<td style="position:sticky;left:0;z-index:5;background:' + rowBg + ';padding:6px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);white-space:nowrap;min-width:' + LABEL_W + 'px;">'
      + '<span style="font-size:12px;color:' + (done?'var(--good)':'var(--text2)') + ';">' + lesson + '</span>'
      + '<span style="font-size:10px;color:var(--text3);margin-left:6px;">' + seen + '/' + total + '</span>'
      + '</td>' + cells + '</tr>';
  }

  let headers = '<th style="position:sticky;left:0;z-index:11;background:var(--surface2);min-width:' + LABEL_W + 'px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);"><div style="font-size:11px;color:var(--text2);font-weight:500;">Lesson</div></th>';
  for (let i = 0; i < allDays.length; i++) {
    const day = allDays[i];
    const isPast = i < pastCount;
    const isToday = day.date === todayStr;
    const dayColor = isPast ? 'var(--good)' : isToday ? 'var(--accent)' : 'var(--text2)';
    const bg = isToday ? 'background:rgba(77,157,224,0.08);' : '';
    headers += '<th style="min-width:' + COL_W + 'px;width:' + COL_W + 'px;padding:4px 2px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border2);' + bg + '">'
      + '<div style="font-size:13px;font-weight:600;color:' + dayColor + ';">Day ' + (i+1) + '</div>'
      + '<div style="font-size:10px;color:var(--text3);margin-top:1px;">' + fmtTableDate(day.date) + '</div>'
      + '</th>';
  }

  return '<div style="overflow-x:auto;overflow-y:auto;max-height:65vh;border:1px solid var(--border);border-radius:10px;">'
    + '<table style="border-collapse:collapse;font-size:12px;font-family:var(--font-ui);">'
    + '<thead><tr style="position:sticky;top:0;z-index:10;background:var(--surface2);">' + headers + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';
}

// ── Mastery projection ───────────────────────────────────────────────────────
function projectMasteryDate(lesson, profileData, planData) {
  const { cardStates } = profileData;
  const { orderedLessons } = planData;
  const cards = RAW[lesson] || [];
  const today = new Date(); today.setHours(0,0,0,0);
  const MASTERY_REPS = 3, MASTERY_INTERVAL = 7;
  const UNSEEN_BUFFER = 21; // days after first study to reach mastery

  let maxDays = 0;

  // Find which day index this lesson's unseen cards get studied (from plan)
  // planData.futureDays is array of { date, byLesson }
  const allDays = [...planData.pastDays, ...planData.futureDays];

  cards.forEach((_, i) => {
    const key = cardKey(lesson, i, 'rec');
    const st = cardStates[key];

    if (!st || st.reps === 0) {
      // Unseen: find first future day this lesson appears in plan
      let studyDate = null;
      for (const day of planData.futureDays) {
        if (day.byLesson[lesson]) { studyDate = day.date; break; }
      }
      if (!studyDate) {
        // lesson not in future plan (already capped out?), use last future day + buffer
        const last = planData.futureDays[planData.futureDays.length - 1];
        studyDate = last ? last.date : localDateStr(today);
      }
      const studyDt = new Date(studyDate + 'T00:00:00');
      const daysToStudy = Math.max(0, Math.round((studyDt - today) / 86400000));
      maxDays = Math.max(maxDays, daysToStudy + UNSEEN_BUFFER);
    } else if (st.reps >= MASTERY_REPS && st.interval >= MASTERY_INTERVAL) {
      // Already mastered — contributes 0 extra days
    } else {
      // Seen but not mastered — forward simulate FSRS until interval >= 7
      let sim = { ...st };
      let daysFromNow = 0;
      const lastReview = sim.lastReview || Date.now();
      // first, add days until next due
      const daysSinceLast = Math.max(0, (Date.now() - lastReview) / 86400000);
      const daysUntilDue = Math.max(0, (sim.interval || 1) - daysSinceLast);
      daysFromNow += daysUntilDue;

      let safetyCount = 0;
      while ((sim.reps < MASTERY_REPS || sim.interval < MASTERY_INTERVAL) && safetyCount < 10) {
        const next = nextFSRS(sim, 3); // assume Good rating
        daysFromNow += next.interval;
        sim = { ...sim, ...next };
        safetyCount++;
      }
      maxDays = Math.max(maxDays, Math.ceil(daysFromNow));
    }
  });

  return maxDays; // days from today
}

function fmtProjection(days) {
  if (days <= 0) return { rel: '~0 days', abs: 'Today', color: 'var(--good)' };
  const date = new Date(); date.setHours(0,0,0,0);
  date.setDate(date.getDate() + days);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const abs = months[date.getMonth()] + ' ' + date.getDate();
  const rel = days === 1 ? '~1 day' : '~' + days + ' days';
  const color = days <= 14 ? 'var(--good)' : days <= 90 ? 'var(--gold)' : 'var(--text2)';
  return { rel, abs, color };
}

// ── Upcoming reviews chart ───────────────────────────────────────────────────
function calcUpcomingReviews(profileData) {
  const { cardStates, settings } = profileData;
  const { selectedLessons, productionEnabled } = settings;
  const dirs = productionEnabled ? ['rec','pro'] : ['rec'];
  const todayMs = new Date(); todayMs.setHours(0,0,0,0);
  const today = todayMs.getTime();

  // bucket: dateStr -> count
  const buckets = {};

  for (const lesson of selectedLessons) {
    (RAW[lesson]||[]).forEach((_,i) => {
      dirs.forEach(dir => {
        const st = cardStates[cardKey(lesson,i,dir)];
        if (!st || !st.lastReview || st.reps === 0) return;
        const dueMs = st.lastReview + st.interval * 86400000;
        const dueDt = new Date(dueMs); dueDt.setHours(0,0,0,0);
        const dueDay = dueDt.getTime();
        // only today and future
        if (dueDay < today) return;
        const dateStr = dueDt.toISOString().slice(0,10);
        buckets[dateStr] = (buckets[dateStr]||0) + 1;
      });
    });
  }
  return buckets;
}

function buildChartBars(buckets, mode) {
  const today = new Date(); today.setHours(0,0,0,0);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let bars = [];

  if (mode === 'days') {
    for (let i = 0; i < 14; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      const dateStr = d.toISOString().slice(0,10);
      const label = months[d.getMonth()] + ' ' + d.getDate();
      bars.push({ label, value: buckets[dateStr]||0, isToday: i===0 });
    }
  } else if (mode === 'weeks') {
    for (let w = 0; w < 8; w++) {
      const start = new Date(today); start.setDate(start.getDate() + w*7);
      const end = new Date(start); end.setDate(end.getDate() + 6);
      let total = 0;
      for (let d = 0; d < 7; d++) {
        const dd = new Date(start); dd.setDate(dd.getDate() + d);
        total += buckets[dd.toISOString().slice(0,10)]||0;
      }
      const label = months[start.getMonth()]+' '+start.getDate()+'–'+end.getDate();
      bars.push({ label, value: total, isToday: w===0 });
    }
  } else if (mode === 'months') {
    for (let m = 0; m < 12; m++) {
      const d = new Date(today.getFullYear(), today.getMonth()+m, 1);
      const dEnd = new Date(today.getFullYear(), today.getMonth()+m+1, 0);
      let total = 0;
      for (let day = new Date(m===0?today:d); day <= dEnd; day.setDate(day.getDate()+1)) {
        total += buckets[day.toISOString().slice(0,10)]||0;
      }
      bars.push({ label: months[d.getMonth()], value: total, isToday: m===0 });
    }
  }
  return bars;
}

function renderReviewChart(profileData, accentColor) {
  const buckets = calcUpcomingReviews(profileData);
  // chartMode stored on window to survive re-renders without full state
  const mode = window._chartMode || 'days';
  const bars = buildChartBars(buckets, mode);
  const maxVal = Math.max(...bars.map(b=>b.value), 1);
  const CHART_H = 140; // px height of bar area

  const btnStyle = (m) => `padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${mode===m?accentColor:'var(--border2)'};background:${mode===m?accentColor:'transparent'};color:${mode===m?'#fff':'var(--text2)'};`;

  const barWidth = mode==='days' ? 'calc((100% - '+((bars.length-1)*6)+'px) / '+bars.length+')' : 'calc((100% - '+((bars.length-1)*4)+'px) / '+bars.length+')';
  const gap = mode==='days' ? '6px' : '4px';

  let barsHTML = bars.map(b => {

    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;">

      <div style="width:100%;height:${CHART_H}px;display:flex;align-items:flex-end;">
        <div style="width:100%;height:${h}px;background:${b.isToday?accentColor:accentColor+'99'};border-radius:3px 3px 0 0;transition:height .3s;"></div>
      </div>
      <div style="font-size:9px;color:${b.isToday?accentColor:'var(--text3)'};margin-top:4px;text-align:center;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;">${b.label}</div>
    </div>`;
  }).join('');

  return `<div>

    </div>

// ── Upcoming reviews chart ───────────────────────────────────────────────────
function calcUpcomingReviews(profileData) {
  const { cardStates, settings } = profileData;
  const { selectedLessons, productionEnabled } = settings;
  const dirs = productionEnabled ? ['rec','pro'] : ['rec'];
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr2 = localDateStr(today);
  const todayTs = today.getTime();

  // bucket: dateStr -> count
  const byDay = {};

  for (const lesson of selectedLessons) {
    (RAW[lesson]||[]).forEach((_,i) => {
      dirs.forEach(dir => {
        const key = cardKey(lesson, i, dir);
        const st = cardStates[key];
        if (!st || st.reps === 0) return; // unseen, skip
        const lastReview = st.lastReview || 0;
        const interval = st.interval || 1;
        const dueTs = lastReview + interval * 86400000;
        const dueDate = new Date(Math.max(dueTs, todayTs));
        dueDate.setHours(0,0,0,0);
        const dateStr = localDateStr(dueDate);
        byDay[dateStr] = (byDay[dateStr]||0) + 1;
      });
    });
  }
  return byDay;
}

function buildChartData(byDay, mode) {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = localDateStr(today);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  if (mode === 'days') {
    const bars = [];
    for (let i = 0; i < 14; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      const dateStr = d.toISOString().slice(0,10);
      const label = MONTHS[d.getMonth()] + ' ' + d.getDate();
      bars.push({ label, value: byDay[dateStr]||0, isToday: i===0 });
    }
    return bars;
  }

  if (mode === 'weeks') {
    const bars = [];
    for (let w = 0; w < 8; w++) {
      const start = new Date(today); start.setDate(start.getDate() + w*7);
      const end = new Date(start); end.setDate(end.getDate() + 6);
      let total = 0;
      for (let d = 0; d < 7; d++) {
        const day = new Date(start); day.setDate(day.getDate() + d);
        total += byDay[day.toISOString().slice(0,10)]||0;
      }
      const label = MONTHS[start.getMonth()]+' '+start.getDate()+'–'+end.getDate();
      bars.push({ label, value: total, isToday: w===0 });
    }
    return bars;
  }

  if (mode === 'months') {
    const bars = [];
    for (let m = 0; m < 12; m++) {
      const start = new Date(today.getFullYear(), today.getMonth() + m, 1);
      const end = new Date(today.getFullYear(), today.getMonth() + m + 1, 0);
      let total = 0;
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        total += byDay[d.toISOString().slice(0,10)]||0;
      }
      bars.push({ label: MONTHS[start.getMonth()]+' '+start.getFullYear(), value: total, isToday: m===0 });
    }
    return bars;
  }
  return [];
}

function renderReviewChart(profileData, accentColor, chartMode) {
  const byDay = calcUpcomingReviews(profileData);
  const bars = buildChartData(byDay, chartMode);
  const maxVal = Math.max(...bars.map(b=>b.value), 1);
  const CHART_H = 160;
  const BAR_W = chartMode==='days' ? 38 : chartMode==='weeks' ? 60 : 54;
  const GAP = chartMode==='days' ? 6 : 8;
  const totalWidth = bars.length * (BAR_W + GAP);

  const barsHTML = bars.map(b => {
    const barH = Math.max(2, Math.round((b.value / maxVal) * CHART_H));
    const bg = b.isToday ? accentColor : 'var(--surface3)';

    </div>`;
  }).join('');

  const totalReviews = bars.reduce((s,b)=>s+b.value,0);
  const avgPerDay = chartMode==='days' ? (totalReviews/14).toFixed(1)

  return `<div>

      <div style="margin-left:auto;font-size:11px;color:var(--text3);align-self:center;">
        avg ${avgPerDay}/day · ${totalReviews} total
      </div>
    </div>
    <div style="overflow-x:auto;padding-bottom:4px;">
      <div style="display:flex;gap:${GAP}px;align-items:flex-end;min-width:${totalWidth}px;padding:4px 2px 0;">
        ${barsHTML}
      </div>
    </div>
  </div>`;
}

// ── Render engine ─────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";

    root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text2);font-family:var(--font-ui)">Loading...</div>`;

  if(!state.activeProfile){renderProfileSelector(root);return;}
  if(state.screen==="review"){renderReview(root);return;}
  if(state.screen==="summary"){renderSummary(root);return;}
  renderMain(root);
}

// ── Save with debounce ────────────────────────────────────────────────────────
function scheduleSave(){
  if(state.saveTimer)clearTimeout(state.saveTimer);
  state.saveTimer=setTimeout(()=>{
    if(state.activeProfile&&state.profileData)
      window._fbSave(state.activeProfile,state.profileData);
  },1500);
}
function setState(patch,doRender=true){
  Object.assign(state,patch);
  if(patch.profileData!==undefined)scheduleSave();
  if(doRender)render();
}
function updateProfile(patch){
  setState({profileData:{...state.profileData,...patch}});
}
function updateSettings(patch){
  const s={...state.profileData.settings,...patch};
  if((patch.examDate!==undefined||patch.masteryTargetDate!==undefined)&&!patch.capOverride){
    s.newCardCap=calcDailyNewCap(s.examDate, s.masteryTargetDate);
    s.capOverride=false;
  }
  updateProfile({settings:s});
}
function updateCardState(key,cs){
  const cardStates={...state.profileData.cardStates,[key]:cs};
  updateProfile({cardStates});
}
function logToday(isNew,isAgain,lesson){
  const today=localDateStr();
  const log=state.profileData.dailyLog||{};
  const d=log[today]||{reviewed:0,newSeen:0,againCount:0,newByLesson:{}};
  const newByLesson={...( d.newByLesson||{})};
  if(isNew&&lesson) newByLesson[lesson]=(newByLesson[lesson]||0)+1;
  updateProfile({dailyLog:{...log,[today]:{reviewed:d.reviewed+1,newSeen:d.newSeen+(isNew?1:0),againCount:d.againCount+(isAgain?1:0),newByLesson}}});
}

// ── Review queue ──────────────────────────────────────────────────────────────
// Returns cards for a lesson in shuffled order for a given dir filter fn
function getLessonCards(lesson, dirs, cardStates, filterFn) {
  const cards = [];
  (RAW[lesson]||[]).forEach((card,idx)=>{
    dirs.forEach(dir=>{
      const key=cardKey(lesson,idx,dir);
      const st=cardStates[key]||{stability:0,difficulty:5,interval:0,reps:0,lastReview:0};
      const c={...card,lesson,idx,key,dir,...st};
      if(filterFn(c)) cards.push(c);
    });
  });
  return shuffle(cards);
}

// Build review queue: due cards only, lesson order, uncapped
function buildReviewQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  for(const lesson of orderedLessons){
    const due=getLessonCards(lesson,dirs,cardStates,c=>c.reps>0);
    queue.push(...due);
  }
  return queue;
}

// Build study queue: new cards only, lesson order, capped
function buildStudyQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,newCardCap,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  let remaining=newCardCap;
  for(const lesson of orderedLessons){
    if(remaining<=0) break;
    const newCards=getLessonCards(lesson,dirs,cardStates,c=>c.reps===0);
    const toAdd=newCards.slice(0,remaining);
    queue.push(...toAdd);
    remaining-=toAdd.length;
  }
  return queue;
}

function handleRating(rating){
  const{queue,queueIdx,sessionResults}=state;
  const card=queue[queueIdx];
  const next=nextFSRS(card,rating);
  updateCardState(card.key,next);
  logToday(card.reps===0,rating===1,card.lesson);

  let newQueue=[...queue];
  if(rating===1&&queueIdx<newQueue.length-1)
    newQueue.splice(Math.min(queueIdx+3,newQueue.length),0,{...card,...next});
  if(queueIdx+1>=newQueue.length){setState({screen:"summary",sessionResults:results,queue:newQueue});}
  else setState({queue:newQueue,queueIdx:queueIdx+1,flipped:false,sessionResults:results});
}

          <div class="btn" id="studyPlanToggle" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:${state.showStudyPlan?'10px 10px 0 0':'10px'};">
            <span style="font-size:13px;color:var(--text2);font-weight:500;">Study Plan</span>
            <span style="font-size:16px;color:var(--text3);display:inline-block;transform:rotate(${state.showStudyPlan?180:0}deg);transition:transform .2s;">▾</span>
          </div>
          ${state.showStudyPlan ? `
          <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;">
            <div style="padding:8px 14px;font-size:11px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);">
              Blue = upcoming · Green = studied · Scroll right to see all days
            </div>
            <div style="padding:12px 14px;">
              ${renderPlanTable(profileData, accentColor)}
            </div>
          </div>` : ''}
        </div>

        <!-- Progress per lesson collapsible -->
        <div style="margin-bottom:20px;">
          <div class="btn" id="lessonDetailToggle" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:${state.showLessonDetail?'10px 10px 0 0':'10px'};">
            <span style="font-size:13px;color:var(--text2);font-weight:500;">Progress per lesson</span>
            <span style="font-size:16px;color:var(--text3);display:inline-block;transform:rotate(${state.showLessonDetail?180:0}deg);transition:transform .2s;">▾</span>
          </div>
          ${state.showLessonDetail ? `
          <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;">
            <div style="padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);">
              <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:4px;">
                <span style="font-size:10px;color:var(--text3);"><span style="color:${accentColor};">■</span> Seen — card reviewed at least once</span>
                <span style="font-size:10px;color:var(--text3);"><span style="color:var(--good);">■</span> Mastered — ≥3 reviews &amp; interval ≥7 days</span>
              </div>
              <div style="font-size:10px;color:var(--text3);">🎯 Projected mastery — estimated date all cards in lesson reach mastered status</div>
            </div>
            <div style="display:flex;flex-direction:column;">
              ${(()=>{
                const planData = buildPlanTable(profileData);
                return LESSONS.map((l,li)=>{
                  const cards=RAW[l]||[];
                  const seen=cards.filter((_,i)=>cardStates[cardKey(l,i,'rec')]?.reps>0).length;
                  const mastered=cards.filter((_,i)=>{const st=cardStates[cardKey(l,i,'rec')];return st&&st.reps>=3&&st.interval>=7;}).length;
                  const p=cards.length?Math.round(seen/cards.length*100):0;
                  const mp=seen?Math.round(mastered/seen*100):0;
                  const allMastered=mastered>=cards.length&&cards.length>0;
                  let projHtml='';
                  if(allMastered){
                    projHtml='<span style="font-size:11px;color:var(--good);font-weight:500;">Mastered ✓</span>';
                  } else {
                    const days=projectMasteryDate(l,profileData,planData);
                    const fmt=fmtProjection(days);
                    projHtml='<span style="font-size:11px;color:'+fmt.color+';">'+fmt.rel+' · '+fmt.abs+'</span>';
                  }
                  return '<div style="padding:10px 14px;border-bottom:1px solid var(--border2);background:'+(li%2===0?'var(--surface)':'var(--surface2)')+';">'
                    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
                    +'<span style="font-size:12px;color:var(--text2);">'+l+'</span>'
                    +'<div style="display:flex;gap:12px;align-items:center;">'
                    +'<span style="font-size:11px;color:var(--text3);">'+seen+'/'+cards.length+'</span>'
                    +projHtml
                    +'</div></div>'
                    +'<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">'
                    +'<div style="height:100%;width:'+p+'%;background:'+accentColor+';border-radius:3px;position:relative;">'
                    +'<div style="position:absolute;top:0;left:0;height:100%;width:'+mp+'%;background:var(--good);border-radius:3px;"></div>'
                    +'</div></div>'
                    +'</div>';
                }).join('');
              })()}
            </div>
          </div>` : ''}
        </div>

        <!-- Upcoming reviews chart collapsible -->
        <div style="margin-bottom:20px;">
          <div class="btn" id="reviewChartToggle" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:${state.showReviewChart?'10px 10px 0 0':'10px'};">
            <span style="font-size:13px;color:var(--text2);font-weight:500;">Upcoming Reviews</span>
            <span style="font-size:16px;color:var(--text3);display:inline-block;transform:rotate(${state.showReviewChart?180:0}deg);transition:transform .2s;">▾</span>
          </div>
          ${state.showReviewChart ? `
          <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:16px 14px;">
            ${renderReviewChart(profileData, accentColor, state.chartMode)}
          </div>` : ''}
        </div>

      </div>
    </div>`;
    document.getElementById('studyPlanToggle')?.addEventListener('click',()=>setState({showStudyPlan:!state.showStudyPlan}));
    document.getElementById('lessonDetailToggle')?.addEventListener('click',()=>setState({showLessonDetail:!state.showLessonDetail}));
    document.getElementById('reviewChartToggle')?.addEventListener('click',()=>setState({showReviewChart:!state.showReviewChart}));
    document.querySelectorAll('.chart-mode-btn').forEach(el=>{
      el.addEventListener('click',()=>setState({chartMode:el.dataset.mode}));
    });
  }

  if(tab==="settings"){
    content.innerHTML=`
    <div style="max-width:540px;margin:0 auto;padding:24px 16px;">
      <div class="fade-up" style="display:flex;flex-direction:column;gap:14px;">

        <!-- Exam date -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;">Exam Date</div>
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="date" id="examDateInput" value="${settings.examDate||""}" style="flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font-ui);"/>
            ${settings.examDate?`<span style="font-size:12px;color:var(--text3);">${daysUntilExam(settings.examDate)}d left</span>`:""}
          </div>
        </div>

        <!-- Mastery target date -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">Mastery Target Date</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">When set, the daily new card cap adjusts so all cards reach mastery (≥3 reviews &amp; ≥7d interval) by this date. Overrides exam-date cap.</div>
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="date" id="masteryDateInput" value="${settings.masteryTargetDate||""}" style="flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font-ui);"/>
            ${settings.masteryTargetDate?`<span style="font-size:12px;color:var(--text3);">${daysUntilExam(settings.masteryTargetDate)}d left</span>`:""}
          </div>
          ${settings.masteryTargetDate?`<div class="btn" id="clearMasteryDate" style="margin-top:8px;font-size:12px;color:var(--again);padding:4px 0;">✕ Clear mastery date</div>`:''}
        </div>

        <!-- New card cap -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <div style="font-size:13px;font-weight:500;color:var(--text);">New cards / session</div>
            <div style="font-size:12px;color:${settings.capOverride?"var(--gold)":"var(--text3)"};">${settings.capOverride?"Manual":"Auto"}</div>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${settings.capOverride?"Override active — drag to change":`Auto-calculated from ${settings.masteryTargetDate ? "mastery target date" : "exam date"} (${settings.newCardCap}/day)`}</div>
          <div style="display:flex;gap:12px;align-items:center;">
            <input type="range" id="capSlider" min="5" max="40" step="1" value="${settings.newCardCap}" style="flex:1;"/>
            <div id="capVal" style="font-size:16px;font-weight:600;color:var(--text);min-width:28px;text-align:right;">${settings.newCardCap}</div>
          </div>
          ${settings.capOverride&&settings.examDate?`<div class="btn" id="resetCap" style="margin-top:10px;font-size:12px;color:var(--accent);padding:4px 0;">↩ Reset to auto</div>`:""}
        </div>

        <!-- Production toggle -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;">Production cards (EN→JP)</div>
            <div style="font-size:12px;color:var(--text3);">Harder. Recommended after recognition is solid.</div>
          </div>
          <div class="btn toggle-track" id="prodToggle" style="background:${settings.productionEnabled?"var(--good)":"var(--border2)"};">
            <div class="toggle-thumb" style="left:${settings.productionEnabled?23:3}px;"></div>
          </div>
        </div>

        <!-- Export / Import -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">Backup & Restore</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Export saves all your card progress and settings to a file. Import restores from a backup.</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <div class="btn" id="exportBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬇ Export Backup</div>
            <div class="btn" id="importBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬆ Import Backup</div>
          </div>
        </div>

        <!-- Profile -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;">Profile</div>
          <div style="font-size:13px;color:var(--text2);">Signed in as <span style="color:${accentColor};font-weight:500;">${activeProfile==='Poori'?(isDark?'Poornima':'Poori'):(isDark?'Abdul':'Dul')}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">Data syncs to Firebase in real-time.</div>
          <div class="btn" id="switchBtn2" style="margin-top:12px;font-size:12px;color:var(--again);padding:4px 0;">Switch Profile</div>
        </div>
      </div>
    </div>`;

    document.getElementById("examDateInput").addEventListener("change",e=>updateSettings({examDate:e.target.value,capOverride:false}));
    document.getElementById("masteryDateInput")?.addEventListener("change",e=>updateSettings({masteryTargetDate:e.target.value||null,capOverride:false}));
    document.getElementById("clearMasteryDate")?.addEventListener("click",()=>updateSettings({masteryTargetDate:null,capOverride:false}));
    const capSlider=document.getElementById("capSlider");
    capSlider.addEventListener("input",e=>{
      document.getElementById("capVal").textContent=e.target.value;
    });
    capSlider.addEventListener("change",e=>updateSettings({newCardCap:+e.target.value,capOverride:true}));
    document.getElementById("resetCap")?.addEventListener("click",()=>updateSettings({capOverride:false}));
    document.getElementById("prodToggle").addEventListener("click",()=>updateSettings({productionEnabled:!settings.productionEnabled}));
    document.getElementById("exportBtn").addEventListener("click",()=>exportData(activeProfile,profileData));
    document.getElementById("importBtn").addEventListener("click",()=>importData(data=>{
      updateProfile(data);alert("Backup restored successfully!");
    }));
    document.getElementById("switchBtn2").addEventListener("click",()=>setState({activeProfile:null,profileData:null,screen:"home"}));
  }
}

// ── Deck browser HTML + events ────────────────────────────────────────────────
function renderDeckBrowserHTML(displayLessons,settings,cardStates,filterBook){
  return`
  <div class="fade-up">
    <div style="display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);">
      ${[["all","All"],["1","Book 1"],["2","Book 2"]].map(([v,l])=>`
        <div class="btn filter-btn" data-filter="${v}" style="padding:7px 14px;font-size:12px;color:${filterBook===v?"var(--accent)":"var(--text2)"};border-bottom:${filterBook===v?"2px solid var(--accent)":"2px solid transparent"};margin-bottom:-1px;">${l}</div>`).join("")}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      <div class="btn" id="selAll" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">All</div>
      <div class="btn" id="selNone" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">None</div>
      ${displayLessons.map(l=>{
        const sel=settings.selectedLessons.includes(l);
        return`<div class="btn lesson-chip${sel?" sel":""}" data-lesson="${l}" style="padding:4px 12px;border-radius:4px;font-size:12px;background:${sel?"":"var(--surface2)"};border:1px solid ${sel?"":"var(--border)"};color:${sel?"":"var(--text2)"};">${l.replace("Lesson ","")}</div>`;
      }).join("")}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;">
        <span>Lesson</span><span style="text-align:right;min-width:50px;">Cards</span><span style="text-align:right;min-width:50px;">Seen</span><span style="text-align:right;min-width:40px;">✓</span>
      </div>
      ${displayLessons.map((l,i)=>{
        const cards=RAW[l]||[];
        const sel=settings.selectedLessons.includes(l);
        const seen=cards.filter((_,idx)=>cardStates[cardKey(l,idx,"rec")]?.reps>0).length;
        return`<div class="deck-row btn" data-lesson="${l}" style="display:grid;grid-template-columns:1fr auto auto auto;padding:11px 14px;border-bottom:${i<displayLessons.length-1?"1px solid var(--border)":"none"};background:${sel?"rgba(77,157,224,0.05)":"transparent"};">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:16px;height:16px;border-radius:3px;border:1px solid ${sel?"var(--accent)":"var(--border2)"};background:${sel?"var(--accent)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              ${sel?`<span style="color:#fff;font-size:10px;font-weight:700;">✓</span>`:""}
            </div>
            <span style="font-size:13px;color:${sel?"var(--text)":"var(--text2)"};">${l}</span>
          </div>
          <span style="font-size:12px;color:var(--text2);text-align:right;min-width:50px;align-self:center;">${cards.length}</span>
          <span style="font-size:12px;text-align:right;min-width:50px;align-self:center;color:${seen>0?"var(--good)":"var(--text3)"};">${seen||"—"}</span>
          <span style="font-size:12px;text-align:right;min-width:40px;align-self:center;color:${sel?"var(--accent)":"var(--text3)"};">${sel?"✓":"—"}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function attachDeckBrowserEvents(displayLessons,settings){
  document.querySelectorAll(".filter-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({filterBook:el.dataset.filter}));
  });
  document.getElementById("selAll")?.addEventListener("click",()=>{
    const next=[...new Set([...settings.selectedLessons,...displayLessons])];
    updateSettings({selectedLessons:next});
  });
  document.getElementById("selNone")?.addEventListener("click",()=>{
    const next=settings.selectedLessons.filter(l=>!displayLessons.includes(l));
    if(next.length>0)updateSettings({selectedLessons:next});
  });
  document.querySelectorAll(".lesson-chip[data-lesson],.deck-row[data-lesson]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const l=el.dataset.lesson;
      const sel=settings.selectedLessons.includes(l);
      const next=sel?settings.selectedLessons.filter(x=>x!==l):[...settings.selectedLessons,l];
      if(next.length>0)updateSettings({selectedLessons:next});
    });
  });
}

// ── Theme button helper ───────────────────────────────────────────────────────
function renderThemeBtn(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="theme-toggle" id="themeToggle_${containerId}">
      <span style="font-size:13px;">${isDark ? "🌙" : "☀️"}</span>
      <div class="theme-toggle-track" style="background:${isDark ? "#4d9de0" : "#ccc"};">
        <div class="theme-toggle-thumb" style="left:${isDark ? 19 : 3}px;"></div>
      </div>
    </div>`;
  document.getElementById(`themeToggle_${containerId}`).addEventListener('click', () => {
    isDark = !isDark;
    applyTheme();
    render();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
onFbReady(()=>render());
// Hook for chart mode toggle buttons (inline onclick can't call setState directly)
window._reRenderProgress = () => { state.tab='progress'; render(); };
</script>
</body>
</html>
