// ── Study plan table ─────────────────────────────────────────────────────────
function buildPlanTable(profileData) {
  const { cardStates, settings, dailyLog } = profileData;
  const { selectedLessons, newCardCap } = settings;
  const orderedLessons = [...selectedLessons].sort((a,b)=>parseInt(a.split(' ')[1])-parseInt(b.split(' ')[1]));

  const seenByLesson = {};
  for (const lesson of orderedLessons) {
    seenByLesson[lesson] = (RAW[lesson]||[]).filter((_,i)=>
      (cardStates[cardKey(lesson,i,'rec')]?.reps||0) > 0
    ).length;
  }
  const totalByLesson = {};
  for (const lesson of orderedLessons) totalByLesson[lesson] = RAW[lesson]?.length || 0;

  const studyDates = Object.keys(dailyLog).filter(d=>dailyLog[d].newSeen>0).sort();
  const pastDays = studyDates.map(date => ({
    date, byLesson: dailyLog[date].newByLesson || {}, total: dailyLog[date].newSeen
  }));

  // remaining by lesson (ground truth from cardStates)
  const rem = {};
  for (const lesson of orderedLessons) rem[lesson] = totalByLesson[lesson] - seenByLesson[lesson];

  // build future days
  const todayStr = new Date().toISOString().slice(0,10);
  const pastDateSet = new Set(studyDates);
  const futureDays = [];
  const datePtr = new Date(todayStr + 'T00:00:00');

  while (true) {
    const dateStr = datePtr.toISOString().slice(0,10);
    if (!pastDateSet.has(dateStr)) {
      let cap = newCardCap;
      const byLesson = {};
      for (const lesson of orderedLessons) {
        if (cap <= 0) break;
        if ((rem[lesson]||0) <= 0) continue;
        const give = Math.min(rem[lesson], cap);
        byLesson[lesson] = give;
        rem[lesson] -= give;
        cap -= give;
      }
      if (Object.keys(byLesson).length === 0) break;
      futureDays.push({ date: dateStr, byLesson });
    }
    datePtr.setDate(datePtr.getDate() + 1);
    if (futureDays.length > 300) break;
  }

  return { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson };
}

function fmtTableDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return (d.getMonth()+1) + '/' + d.getDate();
}

function renderPlanTable(profileData, accentColor) {
  const { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson } = buildPlanTable(profileData);
  const allDays = [...pastDays, ...futureDays];
  const pastCount = pastDays.length;
  const todayStr = new Date().toISOString().slice(0,10);

  if (allDays.length === 0) {
    return '<div style="color:var(--text3);font-size:13px;padding:20px 0;">No cards remaining — all lessons complete!</div>';
  }

  const LABEL_W = 120;
  const COL_W = 60;

  let rows = '';
  for (let li = 0; li < orderedLessons.length; li++) {
    const lesson = orderedLessons[li];
    const total = totalByLesson[lesson];
    const seen = seenByLesson[lesson];
    const done = seen >= total;
    let cells = '';
    for (let i = 0; i < allDays.length; i++) {
      const day = allDays[i];
      const isPast = i < pastCount;
      const val = day.byLesson[lesson] || 0;
      if (!val) {
        cells += '<td style="border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;"></td>';
      } else {
        const color = isPast ? 'var(--good)' : 'var(--accent)';
        cells += '<td style="text-align:center;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;padding:4px 2px;"><span style="font-size:13px;font-weight:500;color:' + color + ';">' + val + '</span></td>';
      }
    }
    const rowBg = li%2===0 ? 'var(--surface)' : 'var(--surface2)';
    rows += '<tr style="background:' + rowBg + ';">'
      + '<td style="position:sticky;left:0;z-index:5;background:' + rowBg + ';padding:6px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);white-space:nowrap;min-width:' + LABEL_W + 'px;">'
      + '<span style="font-size:12px;color:' + (done?'var(--good)':'var(--text2)') + ';">' + lesson + '</span>'
      + '<span style="font-size:10px;color:var(--text3);margin-left:6px;">' + seen + '/' + total + '</span>'
      + '</td>' + cells + '</tr>';
  }

  let headers = '<th style="position:sticky;left:0;z-index:11;background:var(--surface2);min-width:' + LABEL_W + 'px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);"><div style="font-size:11px;color:var(--text2);font-weight:500;">Lesson</div></th>';
  for (let i = 0; i < allDays.length; i++) {
    const day = allDays[i];
    const isPast = i < pastCount;
    const isToday = day.date === todayStr;
    const dayColor = isPast ? 'var(--good)' : isToday ? 'var(--accent)' : 'var(--text2)';
    const bg = isToday ? 'background:rgba(77,157,224,0.08);' : '';
    headers += '<th style="min-width:' + COL_W + 'px;width:' + COL_W + 'px;padding:4px 2px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border2);' + bg + '">'
      + '<div style="font-size:13px;font-weight:600;color:' + dayColor + ';">D' + (i+1) + '</div>'
      + '<div style="font-size:10px;color:var(--text3);margin-top:1px;">' + fmtTableDate(day.date) + '</div>'
      + '</th>';
  }

  return '<div style="overflow-x:auto;overflow-y:auto;max-height:65vh;border:1px solid var(--border);border-radius:10px;">'
    + '<table style="border-collapse:collapse;font-size:12px;font-family:var(--font-ui);">'
    + '<thead><tr style="position:sticky;top:0;z-index:10;background:var(--surface2);">' + headers + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';
}

// ── Mastery projection ───────────────────────────────────────────────────────
function projectMasteryDate(lesson, profileData, planData) {
  const { cardStates } = profileData;
  const { orderedLessons } = planData;
  const cards = RAW[lesson] || [];
  const today = new Date(); today.setHours(0,0,0,0);
  const MASTERY_REPS = 3, MASTERY_INTERVAL = 7;
  const UNSEEN_BUFFER = 21; // days after first study to reach mastery

  let maxDays = 0;

  // Find which day index this lesson's unseen cards get studied (from plan)
  // planData.futureDays is array of { date, byLesson }
  const allDays = [...planData.pastDays, ...planData.futureDays];

  cards.forEach((_, i) => {
    const key = cardKey(lesson, i, 'rec');
    const st = cardStates[key];

    if (!st || st.reps === 0) {
      // Unseen: find first future day this lesson appears in plan
      let studyDate = null;
      for (const day of planData.futureDays) {
        if (day.byLesson[lesson]) { studyDate = day.date; break; }
      }
      if (!studyDate) {
        // lesson not in future plan (already capped out?), use last future day + buffer
        const last = planData.futureDays[planData.futureDays.length - 1];
        studyDate = last ? last.date : today.toISOString().slice(0,10);
      }
      const studyDt = new Date(studyDate + 'T00:00:00');
      const daysToStudy = Math.max(0, Math.round((studyDt - today) / 86400000));
      maxDays = Math.max(maxDays, daysToStudy + UNSEEN_BUFFER);
    } else if (st.reps >= MASTERY_REPS && st.interval >= MASTERY_INTERVAL) {
      // Already mastered — contributes 0 extra days
    } else {
      // Seen but not mastered — forward simulate FSRS until interval >= 7
      let sim = { ...st };
      let daysFromNow = 0;
      const lastReview = sim.lastReview || Date.now();
      // first, add days until next due
      const daysSinceLast = Math.max(0, (Date.now() - lastReview) / 86400000);
      const daysUntilDue = Math.max(0, (sim.interval || 1) - daysSinceLast);
      daysFromNow += daysUntilDue;

      let safetyCount = 0;
      while ((sim.reps < MASTERY_REPS || sim.interval < MASTERY_INTERVAL) && safetyCount < 10) {
        const next = nextFSRS(sim, 3); // assume Good rating
        daysFromNow += next.interval;
        sim = { ...sim, ...next };
        safetyCount++;
      }
      maxDays = Math.max(maxDays, Math.ceil(daysFromNow));
    }
  });

  return maxDays; // days from today
}

function fmtProjection(days) {
  if (days <= 0) return { rel: '~0 days', abs: 'Today', color: 'var(--good)' };
  const date = new Date(); date.setHours(0,0,0,0);
  date.setDate(date.getDate() + days);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const abs = months[date.getMonth()] + ' ' + date.getDate();
  const rel = days === 1 ? '~1 day' : '~' + days + ' days';
  const color = days <= 30 ? 'var(--good)' : days <= 60 ? 'var(--gold)' : 'var(--text2)';
  return { rel, abs, color };
}

// ── Save with debounce ────────────────────────────────────────────────────────
function scheduleSave(){
  if(state.saveTimer)clearTimeout(state.saveTimer);
  state.saveTimer=setTimeout(()=>{
    if(state.activeProfile&&state.profileData)
      window._fbSave(state.activeProfile,state.profileData);
  },1500);
}
function setState(patch,doRender=true){
  Object.assign(state,patch);
  if(patch.profileData!==undefined)scheduleSave();
  if(doRender)render();
}
function updateProfile(patch){
  setState({profileData:{...state.profileData,...patch}});
}
function updateSettings(patch){
  const s={...state.profileData.settings,...patch};
  if(patch.examDate!==undefined&&!patch.capOverride){
    s.newCardCap=calcDailyNewCap(patch.examDate);s.capOverride=false;
  }
  updateProfile({settings:s});
}
function updateCardState(key,cs){
  const cardStates={...state.profileData.cardStates,[key]:cs};
  updateProfile({cardStates});
}
function logToday(isNew,isAgain,lesson){
  const today=new Date().toISOString().slice(0,10);
  const log=state.profileData.dailyLog||{};
  const d=log[today]||{reviewed:0,newSeen:0,againCount:0,newByLesson:{}};
  const newByLesson={...( d.newByLesson||{})};
  if(isNew&&lesson) newByLesson[lesson]=(newByLesson[lesson]||0)+1;
  updateProfile({dailyLog:{...log,[today]:{reviewed:d.reviewed+1,newSeen:d.newSeen+(isNew?1:0),againCount:d.againCount+(isAgain?1:0),newByLesson}}});
}

// ── Review queue ──────────────────────────────────────────────────────────────
// Returns cards for a lesson in shuffled order for a given dir filter fn
function getLessonCards(lesson, dirs, cardStates, filterFn) {
  const cards = [];
  (RAW[lesson]||[]).forEach((card,idx)=>{
    dirs.forEach(dir=>{
      const key=cardKey(lesson,idx,dir);
      const st=cardStates[key]||{stability:0,difficulty:5,interval:0,reps:0,lastReview:0};
      const c={...card,lesson,idx,key,dir,...st};
      if(filterFn(c)) cards.push(c);
    });
  });
  return shuffle(cards);
}

// Build review queue: due cards only, lesson order, uncapped
function buildReviewQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  for(const lesson of orderedLessons){
    const due=getLessonCards(lesson,dirs,cardStates,c=>c.reps>0);
    queue.push(...due);
  }
  return queue;
}

// Build study queue: new cards only, lesson order, capped
function buildStudyQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,newCardCap,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  let remaining=newCardCap;
  for(const lesson of orderedLessons){
    if(remaining<=0) break;
    const newCards=getLessonCards(lesson,dirs,cardStates,c=>c.reps===0);
    const toAdd=newCards.slice(0,remaining);
    queue.push(...toAdd);
    remaining-=toAdd.length;
  }
  return queue;
}

function handleRating(rating){
  const{queue,queueIdx,sessionResults}=state;
  const card=queue[queueIdx];
  const next=nextFSRS(card,rating);
  updateCardState(card.key,next);
  logToday(card.reps===0,rating===1,card.lesson);

  let newQueue=[...queue];
  if(rating===1&&queueIdx<newQueue.length-1)
    newQueue.splice(Math.min(queueIdx+3,newQueue.length),0,{...card,...next});
  if(queueIdx+1>=newQueue.length){setState({screen:"summary",sessionResults:results,queue:newQueue});}
  else setState({queue:newQueue,queueIdx:queueIdx+1,flipped:false,sessionResults:results});
}

    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      <div class="btn" id="selAll" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">All</div>
      <div class="btn" id="selNone" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">None</div>
      ${displayLessons.map(l=>{
        const sel=settings.selectedLessons.includes(l);
        return`<div class="btn lesson-chip${sel?" sel":""}" data-lesson="${l}" style="padding:4px 12px;border-radius:4px;font-size:12px;background:${sel?"":"var(--surface2)"};border:1px solid ${sel?"":"var(--border)"};color:${sel?"":"var(--text2)"};">${l.replace("Lesson ","")}</div>`;
      }).join("")}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;">
        <span>Lesson</span><span style="text-align:right;min-width:50px;">Cards</span><span style="text-align:right;min-width:50px;">Seen</span><span style="text-align:right;min-width:40px;">✓</span>
      </div>
      ${displayLessons.map((l,i)=>{
        const cards=RAW[l]||[];
        const sel=settings.selectedLessons.includes(l);
        const seen=cards.filter((_,idx)=>cardStates[cardKey(l,idx,"rec")]?.reps>0).length;
        return`<div class="deck-row btn" data-lesson="${l}" style="display:grid;grid-template-columns:1fr auto auto auto;padding:11px 14px;border-bottom:${i<displayLessons.length-1?"1px solid var(--border)":"none"};background:${sel?"rgba(77,157,224,0.05)":"transparent"};">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:16px;height:16px;border-radius:3px;border:1px solid ${sel?"var(--accent)":"var(--border2)"};background:${sel?"var(--accent)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              ${sel?`<span style="color:#fff;font-size:10px;font-weight:700;">✓</span>`:""}
            </div>
            <span style="font-size:13px;color:${sel?"var(--text)":"var(--text2)"};">${l}</span>
          </div>
          <span style="font-size:12px;color:var(--text2);text-align:right;min-width:50px;align-self:center;">${cards.length}</span>
          <span style="font-size:12px;text-align:right;min-width:50px;align-self:center;color:${seen>0?"var(--good)":"var(--text3)"};">${seen||"—"}</span>
          <span style="font-size:12px;text-align:right;min-width:40px;align-self:center;color:${sel?"var(--accent)":"var(--text3)"};">${sel?"✓":"—"}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function attachDeckBrowserEvents(displayLessons,settings){
  document.querySelectorAll(".filter-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({filterBook:el.dataset.filter}));
  });
  document.getElementById("selAll")?.addEventListener("click",()=>{
    const next=[...new Set([...settings.selectedLessons,...displayLessons])];
    updateSettings({selectedLessons:next});
  });
  document.getElementById("selNone")?.addEventListener("click",()=>{
    const next=settings.selectedLessons.filter(l=>!displayLessons.includes(l));
    if(next.length>0)updateSettings({selectedLessons:next});
  });
  document.querySelectorAll(".lesson-chip[data-lesson],.deck-row[data-lesson]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const l=el.dataset.lesson;
      const sel=settings.selectedLessons.includes(l);
      const next=sel?settings.selectedLessons.filter(x=>x!==l):[...settings.selectedLessons,l];
      if(next.length>0)updateSettings({selectedLessons:next});
    });
  });
}

// ── Theme button helper ───────────────────────────────────────────────────────
function renderThemeBtn(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="theme-toggle" id="themeToggle_${containerId}">
      <span style="font-size:13px;">${isDark ? "🌙" : "☀️"}</span>
      <div class="theme-toggle-track" style="background:${isDark ? "#4d9de0" : "#ccc"};">
        <div class="theme-toggle-thumb" style="left:${isDark ? 19 : 3}px;"></div>
      </div>
    </div>`;
  document.getElementById(`themeToggle_${containerId}`).addEventListener('click', () => {
    isDark = !isDark;
    applyTheme();
    render();
  });
}

onFbReady(()=>render());

// ── FSRS-4.5 ──────────────────────────────────────────────────────────────────
const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0070,1.9395,0.1100,0.2900,2.2700,0.2500,2.9898,0.5100,0.8360];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1;
function fsrsIS(r){return Math.max(W[r-1],0.1);}
function fsrsID(r){return Math.min(Math.max(W[4]-Math.exp(W[5]*(r-1))+1,1),10);}
function fsrsFC(e,s){return Math.pow(1+FACTOR*e/s,DECAY);}
function fsrsNS(d,s,r,rating){
  if(rating===1)return W[11]*Math.pow(d,-W[12])*(Math.pow(s+1,W[13])-1)*Math.exp(W[14]*(1-r));
  const hp=rating===2?W[15]:1,eb=rating===4?W[16]:1;
  return s*(Math.exp(W[8])*(11-d)*Math.pow(s,-W[9])*(Math.exp(W[10]*(1-r))-1)*hp*eb+1);
}
function fsrsND(d,rating){return Math.min(Math.max(d-W[6]*(rating-3)+W[7]*(W[4]-(d-W[6]*(rating-3))),1),10);}
function fsrsNI(s,ret=0.9){return Math.max(1,Math.round(s/FACTOR*(Math.pow(ret,1/DECAY)-1)));}
function nextFSRS(card,rating){
  const s0=card.stability,now=Date.now();
  if(!s0||card.reps===0){
    const stability=fsrsIS(rating),difficulty=fsrsID(rating);
    return{stability,difficulty,interval:rating===1?0:fsrsNI(stability),reps:rating===1?0:1,lastReview:now};
  }
  const elapsed=Math.max(0,(now-(card.lastReview||now))/86400000);
  const ret=fsrsFC(elapsed,s0);
  const newD=fsrsND(card.difficulty||5,rating),newS=fsrsNS(newD,s0,ret,rating);
  return{stability:Math.max(newS,0.1),difficulty:newD,interval:rating===1?0:fsrsNI(newS),reps:rating===1?0:(card.reps||0)+1,lastReview:now};
}
function previewIntervals(card){return[1,2,3,4].map(r=>fmtDays(nextFSRS(card,r).interval));}
function fmtDays(d){
  if(d===0)return"<10m";if(d===1)return"1d";
  if(d<30)return`${d}d`;if(d<365)return`${Math.round(d/30)}mo`;
  return`${(d/365).toFixed(1)}y`;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function calcDailyNewCap(examDate){
  if(!examDate)return 15;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  const totalDays=Math.max(1,Math.round((exam-today)/86400000));
  const activeDays=Math.max(1,totalDays-NEW_CARDS_CUTOFF_DAYS);
  return Math.max(5,Math.min(30,Math.ceil(998/activeDays)));
}
function daysUntilExam(examDate){
  if(!examDate)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  return Math.round((exam-today)/86400000);
}

function exportData(name,data){
  const blob=new Blob([JSON.stringify({profile:name,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mnn-backup-${name}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(onSuccess){
  const input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.data)onSuccess(parsed.data);
        else alert("Invalid backup file.");
      }catch{alert("Could not read file.");}
    };
    reader.readAsText(file);
  };
  input.click();
}

  const orderedLessons = [...selectedLessons].sort((a,b)=>parseInt(a.split(' ')[1])-parseInt(b.split(' ')[1]));

      (cardStates[cardKey(lesson,i,'rec')]?.reps||0) > 0

  const studyDates = Object.keys(dailyLog).filter(d=>dailyLog[d].newSeen>0).sort();
  const pastDays = studyDates.map(date => ({
    date, byLesson: dailyLog[date].newByLesson || {}, total: dailyLog[date].newSeen
  }));

  // remaining by lesson (ground truth from cardStates)
  const rem = {};
  for (const lesson of orderedLessons) rem[lesson] = totalByLesson[lesson] - seenByLesson[lesson];

  // build future days
  const todayStr = new Date().toISOString().slice(0,10);
  const pastDateSet = new Set(studyDates);
  const futureDays = [];
  const datePtr = new Date(todayStr + 'T00:00:00');

  while (true) {
    const dateStr = datePtr.toISOString().slice(0,10);
    if (!pastDateSet.has(dateStr)) {
      let cap = newCardCap;
      const byLesson = {};
      for (const lesson of orderedLessons) {
        if (cap <= 0) break;
        if ((rem[lesson]||0) <= 0) continue;
        const give = Math.min(rem[lesson], cap);
        byLesson[lesson] = give;
        rem[lesson] -= give;
        cap -= give;
      }
      if (Object.keys(byLesson).length === 0) break;
      futureDays.push({ date: dateStr, byLesson });
    }
    datePtr.setDate(datePtr.getDate() + 1);
    if (futureDays.length > 300) break;
  }

  return { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson };
}

function fmtTableDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return (d.getMonth()+1) + '/' + d.getDate();
}

function renderPlanTable(profileData, accentColor) {
  const { pastDays, futureDays, orderedLessons, totalByLesson, seenByLesson } = buildPlanTable(profileData);
  const allDays = [...pastDays, ...futureDays];
  const pastCount = pastDays.length;
  const todayStr = new Date().toISOString().slice(0,10);

  if (allDays.length === 0) {
    return '<div style="color:var(--text3);font-size:13px;padding:20px 0;">No cards remaining — all lessons complete!</div>';
  }

  const LABEL_W = 120;
  const COL_W = 60;

  let rows = '';
  for (let li = 0; li < orderedLessons.length; li++) {
    const lesson = orderedLessons[li];
    const total = totalByLesson[lesson];
    const seen = seenByLesson[lesson];
    const done = seen >= total;
    let cells = '';
    for (let i = 0; i < allDays.length; i++) {
      const day = allDays[i];
      const isPast = i < pastCount;
      const val = day.byLesson[lesson] || 0;
      if (!val) {
        cells += '<td style="border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;"></td>';
      } else {
        const color = isPast ? 'var(--good)' : 'var(--accent)';
        cells += '<td style="text-align:center;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-width:' + COL_W + 'px;padding:4px 2px;"><span style="font-size:13px;font-weight:500;color:' + color + ';">' + val + '</span></td>';
      }
    }
    const rowBg = li%2===0 ? 'var(--surface)' : 'var(--surface2)';
    rows += '<tr style="background:' + rowBg + ';">'
      + '<td style="position:sticky;left:0;z-index:5;background:' + rowBg + ';padding:6px 10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);white-space:nowrap;min-width:' + LABEL_W + 'px;">'
      + '<span style="font-size:12px;color:' + (done?'var(--good)':'var(--text2)') + ';">' + lesson + '</span>'
      + '<span style="font-size:10px;color:var(--text3);margin-left:6px;">' + seen + '/' + total + '</span>'
      + '</td>' + cells + '</tr>';
  }

  let headers = '<th style="position:sticky;left:0;z-index:11;background:var(--surface2);min-width:' + LABEL_W + 'px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);"><div style="font-size:11px;color:var(--text2);font-weight:500;">Lesson</div></th>';
  for (let i = 0; i < allDays.length; i++) {
    const day = allDays[i];
    const isPast = i < pastCount;
    const isToday = day.date === todayStr;
    const dayColor = isPast ? 'var(--good)' : isToday ? 'var(--accent)' : 'var(--text2)';
    const bg = isToday ? 'background:rgba(77,157,224,0.08);' : '';
    headers += '<th style="min-width:' + COL_W + 'px;width:' + COL_W + 'px;padding:4px 2px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border2);' + bg + '">'
      + '<div style="font-size:13px;font-weight:600;color:' + dayColor + ';">D' + (i+1) + '</div>'
      + '<div style="font-size:10px;color:var(--text3);margin-top:1px;">' + fmtTableDate(day.date) + '</div>'
      + '</th>';
  }

  return '<div style="overflow-x:auto;overflow-y:auto;max-height:65vh;border:1px solid var(--border);border-radius:10px;">'
    + '<table style="border-collapse:collapse;font-size:12px;font-family:var(--font-ui);">'
    + '<thead><tr style="position:sticky;top:0;z-index:10;background:var(--surface2);">' + headers + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';
}

// ── Save with debounce ────────────────────────────────────────────────────────
function scheduleSave(){
  if(state.saveTimer)clearTimeout(state.saveTimer);
  state.saveTimer=setTimeout(()=>{
    if(state.activeProfile&&state.profileData)
      window._fbSave(state.activeProfile,state.profileData);
  },1500);
}
function setState(patch,doRender=true){
  Object.assign(state,patch);
  if(patch.profileData!==undefined)scheduleSave();
  if(doRender)render();
}
function updateProfile(patch){
  setState({profileData:{...state.profileData,...patch}});
}
function updateSettings(patch){
  const s={...state.profileData.settings,...patch};
  if(patch.examDate!==undefined&&!patch.capOverride){
    s.newCardCap=calcDailyNewCap(patch.examDate);s.capOverride=false;
  }
  updateProfile({settings:s});
}
function updateCardState(key,cs){
  const cardStates={...state.profileData.cardStates,[key]:cs};
  updateProfile({cardStates});
}
function logToday(isNew,isAgain,lesson){
  const today=new Date().toISOString().slice(0,10);
  const log=state.profileData.dailyLog||{};
  const d=log[today]||{reviewed:0,newSeen:0,againCount:0,newByLesson:{}};
  const newByLesson={...( d.newByLesson||{})};
  if(isNew&&lesson) newByLesson[lesson]=(newByLesson[lesson]||0)+1;
  updateProfile({dailyLog:{...log,[today]:{reviewed:d.reviewed+1,newSeen:d.newSeen+(isNew?1:0),againCount:d.againCount+(isAgain?1:0),newByLesson}}});
}

// ── Review queue ──────────────────────────────────────────────────────────────
// Returns cards for a lesson in shuffled order for a given dir filter fn
function getLessonCards(lesson, dirs, cardStates, filterFn) {
  const cards = [];
  (RAW[lesson]||[]).forEach((card,idx)=>{
    dirs.forEach(dir=>{
      const key=cardKey(lesson,idx,dir);
      const st=cardStates[key]||{stability:0,difficulty:5,interval:0,reps:0,lastReview:0};
      const c={...card,lesson,idx,key,dir,...st};
      if(filterFn(c)) cards.push(c);
    });
  });
  return shuffle(cards);
}

// Build review queue: due cards only, lesson order, uncapped
function buildReviewQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  for(const lesson of orderedLessons){
    const due=getLessonCards(lesson,dirs,cardStates,c=>c.reps>0);
    queue.push(...due);
  }
  return queue;
}

// Build study queue: new cards only, lesson order, capped
function buildStudyQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,newCardCap,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  let remaining=newCardCap;
  for(const lesson of orderedLessons){
    if(remaining<=0) break;
    const newCards=getLessonCards(lesson,dirs,cardStates,c=>c.reps===0);
    const toAdd=newCards.slice(0,remaining);
    queue.push(...toAdd);
    remaining-=toAdd.length;
  }
  return queue;
}

function handleRating(rating){
  const{queue,queueIdx,sessionResults}=state;
  const card=queue[queueIdx];

  let newQueue=[...queue];
  if(rating===1&&queueIdx<newQueue.length-1)
    newQueue.splice(Math.min(queueIdx+3,newQueue.length),0,{...card,...next});
  if(queueIdx+1>=newQueue.length){setState({screen:"summary",sessionResults:results,queue:newQueue});}
  else setState({queue:newQueue,queueIdx:queueIdx+1,flipped:false,sessionResults:results});
}

  renderThemeBtn("themeBtn");
  document.querySelectorAll(".tab-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({tab:el.dataset.tab}));
  });

  const content=document.getElementById("tabContent");

  // ── Study tab ────────────────────────────────────────────────────────────────
  if(tab==="study"){
    content.innerHTML=`
    <div style="max-width:640px;margin:0 auto;padding:24px 16px;">
      <div class="fade-up" style="margin-bottom:20px;padding:18px 22px;background:var(--surface);border:1px solid ${accentColor};border-radius:12px;opacity:.92;">
        <div style="font-size:14px;color:var(--text);line-height:1.7;">${greeting}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;">
          <div style="font-size:22px;font-weight:500;color:var(--accent);">${dueCount}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">Reviews due</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;">
          <div style="font-size:22px;font-weight:500;color:${accentColor};">${tlog.newSeen}/${settings.newCardCap}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">New today</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;">
          <div style="font-size:22px;font-weight:500;color:${againRate!==null&&againRate>35?"var(--again)":"var(--good)"};">${againRate!==null?againRate+"%":"—"}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">Again rate</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        <div class="btn" id="reviewBtn" style="padding:16px;border-radius:12px;text-align:center;background:${dueCount>0?'var(--accent)':'var(--surface2)'};color:${dueCount>0?'#fff':'var(--text3)'};font-size:15px;font-weight:600;border:1px solid ${dueCount>0?'transparent':'var(--border2)'};opacity:${dueCount>0?1:0.5};pointer-events:${dueCount>0?'auto':'none'};">
          <div style="font-size:10px;opacity:.8;margin-bottom:4px;letter-spacing:1px;">REVIEWS</div>
          ${dueCount>0?`${dueCount} due`:'None due'}
        </div>
        <div class="btn" id="startBtn" style="padding:16px;border-radius:12px;text-align:center;background:${newLeft>0?accentColor:'var(--surface2)'};color:${newLeft>0?'#fff':'var(--text3)'};font-size:15px;font-weight:600;border:1px solid ${newLeft>0?'transparent':'var(--border2)'};opacity:${newLeft>0?1:0.5};pointer-events:${newLeft>0?'auto':'none'};">
          <div style="font-size:10px;opacity:.8;margin-bottom:4px;letter-spacing:1px;">STUDY</div>
          ${newLeft>0?`${newLeft} new cards`:'Cap reached'}
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:13px;color:var(--text2);font-weight:500;">Deck Browser</div>
        <div class="btn" id="deckToggle" style="font-size:12px;padding:4px 12px;border-radius:20px;background:${showDeckBrowser?"var(--accent)":"var(--surface2)"};color:${showDeckBrowser?"#fff":"var(--text2)"};border:1px solid ${showDeckBrowser?"var(--accent)":"var(--border2)"};">${showDeckBrowser?"Hide":"Show"}</div>
      </div>
      ${showDeckBrowser?renderDeckBrowserHTML(displayLessons,settings,cardStates,filterBook):""}
    </div>`;

    document.getElementById("startBtn").addEventListener("click",()=>{
      const q=buildStudyQueue();setState({queue:q,queueIdx:0,flipped:false,sessionResults:[],screen:"review",sessionMode:"study"});
    });
    document.getElementById("reviewBtn")?.addEventListener("click",()=>{
      const q=buildReviewQueue();setState({queue:q,queueIdx:0,flipped:false,sessionResults:[],screen:"review",sessionMode:"review"});
    });
    document.getElementById("deckToggle").addEventListener("click",()=>setState({showDeckBrowser:!showDeckBrowser}));
    if(showDeckBrowser)attachDeckBrowserEvents(displayLessons,settings);
  }

  // ── Progress tab ─────────────────────────────────────────────────────────────
  if(tab==="progress"){
    const totalDaysStudied=Object.keys(dailyLog).length;
    const totalReviews=Object.values(dailyLog).reduce((s,d)=>s+d.reviewed,0);
    const pct=totalVocab?Math.round(totalStudied/totalVocab*100):0;
    content.innerHTML=`
    <div style="max-width:640px;margin:0 auto;padding:24px 16px;">
      <div class="fade-up">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
            <div style="font-size:28px;font-weight:500;color:${accentColor};">${totalStudied}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px;">words seen</div>
            <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px;">
              <div style="height:100%;width:${pct}%;background:${accentColor};border-radius:2px;"></div>
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px;">${pct}% of ${totalVocab}</div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
            <div style="font-size:28px;font-weight:500;color:var(--good);">${totalDaysStudied}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:4px;">days studied</div>
            <div style="font-size:12px;color:var(--text2);margin-top:8px;">${totalReviews} total reviews</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:500;">Progress per lesson</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${LESSONS.map(l=>{
            const cards=RAW[l]||[];
            const seen=cards.filter((_,i)=>cardStates[cardKey(l,i,"rec")]?.reps>0).length;
            const mastered=cards.filter((_,i)=>{const st=cardStates[cardKey(l,i,"rec")];return st&&st.reps>=3&&st.interval>=7;}).length;
            const p=cards.length?Math.round(seen/cards.length*100):0;
            const mp=seen?Math.round(mastered/seen*100):0;
            const inSel=settings.selectedLessons.includes(l);
            return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;opacity:${inSel?1:0.5};">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span style="font-size:12px;color:var(--text2);">${l}</span>
                <span style="font-size:11px;color:var(--text3);">${seen}/${cards.length} seen · ${mastered} mastered</span>
              </div>
              <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${p}%;background:${accentColor};border-radius:3px;position:relative;">
                  <div style="position:absolute;top:0;left:0;height:100%;width:${mp}%;background:var(--good);border-radius:3px;"></div>
                </div>
              </div>
            </div>`;
          }).join("")}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text3);display:flex;gap:16px;">
          <span><span style="color:${accentColor};">■</span> Seen</span>
          <span><span style="color:var(--good);">■</span> Mastered (≥3 reviews, ≥7d interval)</span>
        </div>

        <!-- Study plan table -->
        <div style="margin-top:28px;">
          <div style="font-size:13px;color:var(--text2);margin-bottom:10px;font-weight:500;">Study Plan</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">
            Blue = upcoming · Green = studied · Scroll right to see all days
          </div>
          ${renderPlanTable(profileData, accentColor)}
        </div>
      </div>
    </div>`;
  }

  // ── Settings tab ──────────────────────────────────────────────────────────────
  if(tab==="settings"){
    content.innerHTML=`
    <div style="max-width:540px;margin:0 auto;padding:24px 16px;">
      <div class="fade-up" style="display:flex;flex-direction:column;gap:14px;">

        <!-- Exam date -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;">Exam Date</div>
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="date" id="examDateInput" value="${settings.examDate||""}" style="flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font-ui);"/>
            ${settings.examDate?`<span style="font-size:12px;color:var(--text3);">${daysUntilExam(settings.examDate)}d left</span>`:""}
          </div>
        </div>

        <!-- New card cap -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <div style="font-size:13px;font-weight:500;color:var(--text);">New cards / session</div>
            <div style="font-size:12px;color:${settings.capOverride?"var(--gold)":"var(--text3)"};">${settings.capOverride?"Manual":"Auto"}</div>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${settings.capOverride?"Override active — drag to change":`Auto-calculated from exam date (${settings.newCardCap}/day)`}</div>
          <div style="display:flex;gap:12px;align-items:center;">
            <input type="range" id="capSlider" min="5" max="40" step="1" value="${settings.newCardCap}" style="flex:1;"/>
            <div id="capVal" style="font-size:16px;font-weight:600;color:var(--text);min-width:28px;text-align:right;">${settings.newCardCap}</div>
          </div>
          ${settings.capOverride&&settings.examDate?`<div class="btn" id="resetCap" style="margin-top:10px;font-size:12px;color:var(--accent);padding:4px 0;">↩ Reset to auto</div>`:""}
        </div>

        <!-- Production toggle -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;">Production cards (EN→JP)</div>
            <div style="font-size:12px;color:var(--text3);">Harder. Recommended after recognition is solid.</div>
          </div>
          <div class="btn toggle-track" id="prodToggle" style="background:${settings.productionEnabled?"var(--good)":"var(--border2)"};">
            <div class="toggle-thumb" style="left:${settings.productionEnabled?23:3}px;"></div>
          </div>
        </div>

        <!-- Export / Import -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">Backup & Restore</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Export saves all your card progress and settings to a file. Import restores from a backup.</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <div class="btn" id="exportBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬇ Export Backup</div>
            <div class="btn" id="importBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬆ Import Backup</div>
          </div>
        </div>

        <!-- Profile -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;">Profile</div>
          <div style="font-size:13px;color:var(--text2);">Signed in as <span style="color:${accentColor};font-weight:500;">${activeProfile}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">Data syncs to Firebase in real-time.</div>
          <div class="btn" id="switchBtn2" style="margin-top:12px;font-size:12px;color:var(--again);padding:4px 0;">Switch Profile</div>
        </div>
      </div>
    </div>`;

    document.getElementById("examDateInput").addEventListener("change",e=>updateSettings({examDate:e.target.value,capOverride:false}));
    const capSlider=document.getElementById("capSlider");
    capSlider.addEventListener("input",e=>{
      document.getElementById("capVal").textContent=e.target.value;
    });
    capSlider.addEventListener("change",e=>updateSettings({newCardCap:+e.target.value,capOverride:true}));
    document.getElementById("resetCap")?.addEventListener("click",()=>updateSettings({capOverride:false}));
    document.getElementById("prodToggle").addEventListener("click",()=>updateSettings({productionEnabled:!settings.productionEnabled}));
    document.getElementById("exportBtn").addEventListener("click",()=>exportData(activeProfile,profileData));
    document.getElementById("importBtn").addEventListener("click",()=>importData(data=>{
      updateProfile(data);alert("Backup restored successfully!");
    }));
    document.getElementById("switchBtn2").addEventListener("click",()=>setState({activeProfile:null,profileData:null,screen:"home"}));
  }
}

// ── Deck browser HTML + events ────────────────────────────────────────────────
function renderDeckBrowserHTML(displayLessons,settings,cardStates,filterBook){
  return`
  <div class="fade-up">
    <div style="display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);">
      ${[["all","All"],["1","Book 1"],["2","Book 2"]].map(([v,l])=>`
        <div class="btn filter-btn" data-filter="${v}" style="padding:7px 14px;font-size:12px;color:${filterBook===v?"var(--accent)":"var(--text2)"};border-bottom:${filterBook===v?"2px solid var(--accent)":"2px solid transparent"};margin-bottom:-1px;">${l}</div>`).join("")}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      <div class="btn" id="selAll" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">All</div>
      <div class="btn" id="selNone" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">None</div>
      ${displayLessons.map(l=>{
        const sel=settings.selectedLessons.includes(l);
        return`<div class="btn lesson-chip${sel?" sel":""}" data-lesson="${l}" style="padding:4px 12px;border-radius:4px;font-size:12px;background:${sel?"":"var(--surface2)"};border:1px solid ${sel?"":"var(--border)"};color:${sel?"":"var(--text2)"};">${l.replace("Lesson ","")}</div>`;
      }).join("")}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;">
        <span>Lesson</span><span style="text-align:right;min-width:50px;">Cards</span><span style="text-align:right;min-width:50px;">Seen</span><span style="text-align:right;min-width:40px;">✓</span>
      </div>
      ${displayLessons.map((l,i)=>{
        const cards=RAW[l]||[];
        const sel=settings.selectedLessons.includes(l);
        const seen=cards.filter((_,idx)=>cardStates[cardKey(l,idx,"rec")]?.reps>0).length;
        return`<div class="deck-row btn" data-lesson="${l}" style="display:grid;grid-template-columns:1fr auto auto auto;padding:11px 14px;border-bottom:${i<displayLessons.length-1?"1px solid var(--border)":"none"};background:${sel?"rgba(77,157,224,0.05)":"transparent"};">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:16px;height:16px;border-radius:3px;border:1px solid ${sel?"var(--accent)":"var(--border2)"};background:${sel?"var(--accent)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              ${sel?`<span style="color:#fff;font-size:10px;font-weight:700;">✓</span>`:""}
            </div>
            <span style="font-size:13px;color:${sel?"var(--text)":"var(--text2)"};">${l}</span>
          </div>
          <span style="font-size:12px;color:var(--text2);text-align:right;min-width:50px;align-self:center;">${cards.length}</span>
          <span style="font-size:12px;text-align:right;min-width:50px;align-self:center;color:${seen>0?"var(--good)":"var(--text3)"};">${seen||"—"}</span>
          <span style="font-size:12px;text-align:right;min-width:40px;align-self:center;color:${sel?"var(--accent)":"var(--text3)"};">${sel?"✓":"—"}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function attachDeckBrowserEvents(displayLessons,settings){
  document.querySelectorAll(".filter-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({filterBook:el.dataset.filter}));
  });
  document.getElementById("selAll")?.addEventListener("click",()=>{
    const next=[...new Set([...settings.selectedLessons,...displayLessons])];
    updateSettings({selectedLessons:next});
  });
  document.getElementById("selNone")?.addEventListener("click",()=>{
    const next=settings.selectedLessons.filter(l=>!displayLessons.includes(l));
    if(next.length>0)updateSettings({selectedLessons:next});
  });
  document.querySelectorAll(".lesson-chip[data-lesson],.deck-row[data-lesson]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const l=el.dataset.lesson;
      const sel=settings.selectedLessons.includes(l);
      const next=sel?settings.selectedLessons.filter(x=>x!==l):[...settings.selectedLessons,l];
      if(next.length>0)updateSettings({selectedLessons:next});
    });
  });
}

// ── Theme button helper ───────────────────────────────────────────────────────
function renderThemeBtn(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="theme-toggle" id="themeToggle_${containerId}">
      <span style="font-size:13px;">${isDark ? "🌙" : "☀️"}</span>
      <div class="theme-toggle-track" style="background:${isDark ? "#4d9de0" : "#ccc"};">
        <div class="theme-toggle-thumb" style="left:${isDark ? 19 : 3}px;"></div>
      </div>
    </div>`;
  document.getElementById(`themeToggle_${containerId}`).addEventListener('click', () => {
    isDark = !isDark;
    applyTheme();
    render();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
onFbReady(()=>render());
</script>
</body>
</html>

<style>

  --again:#c0392b;--hard:#e67e22;--good:#27ae60;--easy:#2980b9;

// ── FSRS-4.5 ──────────────────────────────────────────────────────────────────
const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0070,1.9395,0.1100,0.2900,2.2700,0.2500,2.9898,0.5100,0.8360];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1;
function fsrsIS(r){return Math.max(W[r-1],0.1);}
function fsrsID(r){return Math.min(Math.max(W[4]-Math.exp(W[5]*(r-1))+1,1),10);}
function fsrsFC(e,s){return Math.pow(1+FACTOR*e/s,DECAY);}
function fsrsNS(d,s,r,rating){
  if(rating===1)return W[11]*Math.pow(d,-W[12])*(Math.pow(s+1,W[13])-1)*Math.exp(W[14]*(1-r));
  const hp=rating===2?W[15]:1,eb=rating===4?W[16]:1;
  return s*(Math.exp(W[8])*(11-d)*Math.pow(s,-W[9])*(Math.exp(W[10]*(1-r))-1)*hp*eb+1);
}
function fsrsND(d,rating){return Math.min(Math.max(d-W[6]*(rating-3)+W[7]*(W[4]-(d-W[6]*(rating-3))),1),10);}
function fsrsNI(s,ret=0.9){return Math.max(1,Math.round(s/FACTOR*(Math.pow(ret,1/DECAY)-1)));}
function nextFSRS(card,rating){
  const s0=card.stability,now=Date.now();
  if(!s0||card.reps===0){
    const stability=fsrsIS(rating),difficulty=fsrsID(rating);
    return{stability,difficulty,interval:rating===1?0:fsrsNI(stability),reps:rating===1?0:1,lastReview:now};
  }
  const elapsed=Math.max(0,(now-(card.lastReview||now))/86400000);
  const ret=fsrsFC(elapsed,s0);
  const newD=fsrsND(card.difficulty||5,rating),newS=fsrsNS(newD,s0,ret,rating);
  return{stability:Math.max(newS,0.1),difficulty:newD,interval:rating===1?0:fsrsNI(newS),reps:rating===1?0:(card.reps||0)+1,lastReview:now};
}
function previewIntervals(card){return[1,2,3,4].map(r=>fmtDays(nextFSRS(card,r).interval));}
function fmtDays(d){
  if(d===0)return"<10m";if(d===1)return"1d";
  if(d<30)return`${d}d`;if(d<365)return`${Math.round(d/30)}mo`;
  return`${(d/365).toFixed(1)}y`;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── Study plan ────────────────────────────────────────────────────────────────
function calcDailyNewCap(examDate){
  if(!examDate)return 15;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  const totalDays=Math.max(1,Math.round((exam-today)/86400000));
  const activeDays=Math.max(1,totalDays-NEW_CARDS_CUTOFF_DAYS);
  return Math.max(5,Math.min(30,Math.ceil(998/activeDays)));
}
function daysUntilExam(examDate){
  if(!examDate)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  return Math.round((exam-today)/86400000);
}

function exportData(name,data){
  const blob=new Blob([JSON.stringify({profile:name,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mnn-backup-${name}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(onSuccess){
  const input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.data)onSuccess(parsed.data);
        else alert("Invalid backup file.");
      }catch{alert("Could not read file.");}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Save with debounce ────────────────────────────────────────────────────────
function scheduleSave(){
  if(state.saveTimer)clearTimeout(state.saveTimer);
  state.saveTimer=setTimeout(()=>{
    if(state.activeProfile&&state.profileData)
      window._fbSave(state.activeProfile,state.profileData);
  },1500);
}
function setState(patch,doRender=true){
  Object.assign(state,patch);
  if(patch.profileData!==undefined)scheduleSave();
  if(doRender)render();
}
function updateProfile(patch){
  setState({profileData:{...state.profileData,...patch}});
}
function updateSettings(patch){
  const s={...state.profileData.settings,...patch};
  if(patch.examDate!==undefined&&!patch.capOverride){
    s.newCardCap=calcDailyNewCap(patch.examDate);s.capOverride=false;
  }
  updateProfile({settings:s});
}
function updateCardState(key,cs){
  const cardStates={...state.profileData.cardStates,[key]:cs};
  updateProfile({cardStates});
}
function logToday(isNew,isAgain){
  const today=new Date().toISOString().slice(0,10);
  const log=state.profileData.dailyLog||{};
  const d=log[today]||{reviewed:0,newSeen:0,againCount:0};
  updateProfile({dailyLog:{...log,[today]:{reviewed:d.reviewed+1,newSeen:d.newSeen+(isNew?1:0),againCount:d.againCount+(isAgain?1:0)}}});
}

// ── Review queue ──────────────────────────────────────────────────────────────
// Returns cards for a lesson in shuffled order for a given dir filter fn
function getLessonCards(lesson, dirs, cardStates, filterFn) {
  const cards = [];
  (RAW[lesson]||[]).forEach((card,idx)=>{
    dirs.forEach(dir=>{
      const key=cardKey(lesson,idx,dir);
      const st=cardStates[key]||{stability:0,difficulty:5,interval:0,reps:0,lastReview:0};
      const c={...card,lesson,idx,key,dir,...st};
      if(filterFn(c)) cards.push(c);
    });
  });
  return shuffle(cards);
}

// Build review queue: due cards only, lesson order, uncapped
function buildReviewQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  for(const lesson of orderedLessons){
    const due=getLessonCards(lesson,dirs,cardStates,c=>c.reps>0);
    queue.push(...due);
  }
  return queue;
}

// Build study queue: new cards only, lesson order, capped
function buildStudyQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,newCardCap,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const orderedLessons=[...selectedLessons].sort((a,b)=>parseInt(a.split(" ")[1])-parseInt(b.split(" ")[1]));
  const queue=[];
  let remaining=newCardCap;
  for(const lesson of orderedLessons){
    if(remaining<=0) break;
    const newCards=getLessonCards(lesson,dirs,cardStates,c=>c.reps===0);
    const toAdd=newCards.slice(0,remaining);
    queue.push(...toAdd);
    remaining-=toAdd.length;
  }
  return queue;
}

function handleRating(rating){
  const{queue,queueIdx,sessionResults}=state;
  const card=queue[queueIdx];
  const next=nextFSRS(card,rating);
  updateCardState(card.key,next);
  logToday(card.reps===0,rating===1);

  let newQueue=[...queue];
  if(rating===1&&queueIdx<newQueue.length-1)
    newQueue.splice(Math.min(queueIdx+3,newQueue.length),0,{...card,...next});
  if(queueIdx+1>=newQueue.length){setState({screen:"summary",sessionResults:results,queue:newQueue});}
  else setState({queue:newQueue,queueIdx:queueIdx+1,flipped:false,sessionResults:results});
}

              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span style="font-size:12px;color:var(--text2);">${l}</span>
                <span style="font-size:11px;color:var(--text3);">${seen}/${cards.length} seen · ${mastered} mastered</span>
              </div>
              <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${p}%;background:${accentColor};border-radius:3px;position:relative;">
                  <div style="position:absolute;top:0;left:0;height:100%;width:${mp}%;background:var(--good);border-radius:3px;"></div>
                </div>
              </div>
            </div>`;
          }).join("")}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text3);display:flex;gap:16px;">
          <span><span style="color:${accentColor};">■</span> Seen</span>
          <span><span style="color:var(--good);">■</span> Mastered (≥3 reviews, ≥7d interval)</span>
        </div>
      </div>

  }

  // ── Settings tab ──────────────────────────────────────────────────────────────
  if(tab==="settings"){
    content.innerHTML=`
    <div style="max-width:540px;margin:0 auto;padding:24px 16px;">
      <div class="fade-up" style="display:flex;flex-direction:column;gap:14px;">

        <!-- Exam date -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;">Exam Date</div>
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="date" id="examDateInput" value="${settings.examDate||""}" style="flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font-ui);"/>
            ${settings.examDate?`<span style="font-size:12px;color:var(--text3);">${daysUntilExam(settings.examDate)}d left</span>`:""}
          </div>
        </div>

        <!-- New card cap -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <div style="font-size:13px;font-weight:500;color:var(--text);">New cards / session</div>
            <div style="font-size:12px;color:${settings.capOverride?"var(--gold)":"var(--text3)"};">${settings.capOverride?"Manual":"Auto"}</div>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${settings.capOverride?"Override active — drag to change":`Auto-calculated from exam date (${settings.newCardCap}/day)`}</div>
          <div style="display:flex;gap:12px;align-items:center;">
            <input type="range" id="capSlider" min="5" max="40" step="1" value="${settings.newCardCap}" style="flex:1;"/>
            <div id="capVal" style="font-size:16px;font-weight:600;color:var(--text);min-width:28px;text-align:right;">${settings.newCardCap}</div>
          </div>
          ${settings.capOverride&&settings.examDate?`<div class="btn" id="resetCap" style="margin-top:10px;font-size:12px;color:var(--accent);padding:4px 0;">↩ Reset to auto</div>`:""}
        </div>

        <!-- Production toggle -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;">Production cards (EN→JP)</div>
            <div style="font-size:12px;color:var(--text3);">Harder. Recommended after recognition is solid.</div>
          </div>
          <div class="btn toggle-track" id="prodToggle" style="background:${settings.productionEnabled?"var(--good)":"var(--border2)"};">
            <div class="toggle-thumb" style="left:${settings.productionEnabled?23:3}px;"></div>
          </div>
        </div>

        <!-- Export / Import -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">Backup & Restore</div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Export saves all your card progress and settings to a file. Import restores from a backup.</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <div class="btn" id="exportBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬇ Export Backup</div>
            <div class="btn" id="importBtn" style="padding:9px 18px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;">⬆ Import Backup</div>
          </div>
        </div>

        <!-- Profile -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;">
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;">Profile</div>
          <div style="font-size:13px;color:var(--text2);">Signed in as <span style="color:${accentColor};font-weight:500;">${activeProfile}</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">Data syncs to Firebase in real-time.</div>
          <div class="btn" id="switchBtn2" style="margin-top:12px;font-size:12px;color:var(--again);padding:4px 0;">Switch Profile</div>
        </div>
      </div>
    </div>`;

    document.getElementById("examDateInput").addEventListener("change",e=>updateSettings({examDate:e.target.value,capOverride:false}));
    const capSlider=document.getElementById("capSlider");
    capSlider.addEventListener("input",e=>{
      document.getElementById("capVal").textContent=e.target.value;
    });
    capSlider.addEventListener("change",e=>updateSettings({newCardCap:+e.target.value,capOverride:true}));
    document.getElementById("resetCap")?.addEventListener("click",()=>updateSettings({capOverride:false}));
    document.getElementById("prodToggle").addEventListener("click",()=>updateSettings({productionEnabled:!settings.productionEnabled}));
    document.getElementById("exportBtn").addEventListener("click",()=>exportData(activeProfile,profileData));
    document.getElementById("importBtn").addEventListener("click",()=>importData(data=>{
      updateProfile(data);alert("Backup restored successfully!");
    }));
    document.getElementById("switchBtn2").addEventListener("click",()=>setState({activeProfile:null,profileData:null,screen:"home"}));
  }
}

// ── Deck browser HTML + events ────────────────────────────────────────────────
function renderDeckBrowserHTML(displayLessons,settings,cardStates,filterBook){
  return`
  <div class="fade-up">
    <div style="display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);">
      ${[["all","All"],["1","Book 1"],["2","Book 2"]].map(([v,l])=>`
        <div class="btn filter-btn" data-filter="${v}" style="padding:7px 14px;font-size:12px;color:${filterBook===v?"var(--accent)":"var(--text2)"};border-bottom:${filterBook===v?"2px solid var(--accent)":"2px solid transparent"};margin-bottom:-1px;">${l}</div>`).join("")}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      <div class="btn" id="selAll" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">All</div>
      <div class="btn" id="selNone" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">None</div>
      ${displayLessons.map(l=>{
        const sel=settings.selectedLessons.includes(l);
        return`<div class="btn lesson-chip${sel?" sel":""}" data-lesson="${l}" style="padding:4px 12px;border-radius:4px;font-size:12px;background:${sel?"":"var(--surface2)"};border:1px solid ${sel?"":"var(--border)"};color:${sel?"":"var(--text2)"};">${l.replace("Lesson ","")}</div>`;
      }).join("")}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;">
        <span>Lesson</span><span style="text-align:right;min-width:50px;">Cards</span><span style="text-align:right;min-width:50px;">Seen</span><span style="text-align:right;min-width:40px;">✓</span>
      </div>
      ${displayLessons.map((l,i)=>{
        const cards=RAW[l]||[];
        const sel=settings.selectedLessons.includes(l);
        const seen=cards.filter((_,idx)=>cardStates[cardKey(l,idx,"rec")]?.reps>0).length;
        return`<div class="deck-row btn" data-lesson="${l}" style="display:grid;grid-template-columns:1fr auto auto auto;padding:11px 14px;border-bottom:${i<displayLessons.length-1?"1px solid var(--border)":"none"};background:${sel?"rgba(77,157,224,0.05)":"transparent"};">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:16px;height:16px;border-radius:3px;border:1px solid ${sel?"var(--accent)":"var(--border2)"};background:${sel?"var(--accent)":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              ${sel?`<span style="color:#fff;font-size:10px;font-weight:700;">✓</span>`:""}
            </div>
            <span style="font-size:13px;color:${sel?"var(--text)":"var(--text2)"};">${l}</span>
          </div>
          <span style="font-size:12px;color:var(--text2);text-align:right;min-width:50px;align-self:center;">${cards.length}</span>
          <span style="font-size:12px;text-align:right;min-width:50px;align-self:center;color:${seen>0?"var(--good)":"var(--text3)"};">${seen||"—"}</span>
          <span style="font-size:12px;text-align:right;min-width:40px;align-self:center;color:${sel?"var(--accent)":"var(--text3)"};">${sel?"✓":"—"}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function attachDeckBrowserEvents(displayLessons,settings){
  document.querySelectorAll(".filter-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({filterBook:el.dataset.filter}));
  });
  document.getElementById("selAll")?.addEventListener("click",()=>{
    const next=[...new Set([...settings.selectedLessons,...displayLessons])];
    updateSettings({selectedLessons:next});
  });
  document.getElementById("selNone")?.addEventListener("click",()=>{
    const next=settings.selectedLessons.filter(l=>!displayLessons.includes(l));
    if(next.length>0)updateSettings({selectedLessons:next});
  });
  document.querySelectorAll(".lesson-chip[data-lesson],.deck-row[data-lesson]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const l=el.dataset.lesson;
      const sel=settings.selectedLessons.includes(l);
      const next=sel?settings.selectedLessons.filter(x=>x!==l):[...settings.selectedLessons,l];
      if(next.length>0)updateSettings({selectedLessons:next});
    });
  });
}

// ── Theme button helper ───────────────────────────────────────────────────────
function renderThemeBtn(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="theme-toggle" id="themeToggle_${containerId}">
      <span style="font-size:13px;">${isDark ? "🌙" : "☀️"}</span>
      <div class="theme-toggle-track" style="background:${isDark ? "#4d9de0" : "#ccc"};">
        <div class="theme-toggle-thumb" style="left:${isDark ? 19 : 3}px;"></div>
      </div>
    </div>`;
  document.getElementById(`themeToggle_${containerId}`).addEventListener('click', () => {
    isDark = !isDark;
    applyTheme();
    render();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
onFbReady(()=>render());
</script>

// ── FSRS-4.5 ──────────────────────────────────────────────────────────────────
const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0070,1.9395,0.1100,0.2900,2.2700,0.2500,2.9898,0.5100,0.8360];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1;
function fsrsIS(r){return Math.max(W[r-1],0.1);}
function fsrsID(r){return Math.min(Math.max(W[4]-Math.exp(W[5]*(r-1))+1,1),10);}
function fsrsFC(e,s){return Math.pow(1+FACTOR*e/s,DECAY);}
function fsrsNS(d,s,r,rating){
  if(rating===1)return W[11]*Math.pow(d,-W[12])*(Math.pow(s+1,W[13])-1)*Math.exp(W[14]*(1-r));
  const hp=rating===2?W[15]:1,eb=rating===4?W[16]:1;
  return s*(Math.exp(W[8])*(11-d)*Math.pow(s,-W[9])*(Math.exp(W[10]*(1-r))-1)*hp*eb+1);
}
function fsrsND(d,rating){return Math.min(Math.max(d-W[6]*(rating-3)+W[7]*(W[4]-(d-W[6]*(rating-3))),1),10);}
function fsrsNI(s,ret=0.9){return Math.max(1,Math.round(s/FACTOR*(Math.pow(ret,1/DECAY)-1)));}
function nextFSRS(card,rating){
  const s0=card.stability,now=Date.now();
  if(!s0||card.reps===0){
    const stability=fsrsIS(rating),difficulty=fsrsID(rating);
    return{stability,difficulty,interval:rating===1?0:fsrsNI(stability),reps:rating===1?0:1,lastReview:now};
  }
  const elapsed=Math.max(0,(now-(card.lastReview||now))/86400000);
  const ret=fsrsFC(elapsed,s0);
  const newD=fsrsND(card.difficulty||5,rating),newS=fsrsNS(newD,s0,ret,rating);
  return{stability:Math.max(newS,0.1),difficulty:newD,interval:rating===1?0:fsrsNI(newS),reps:rating===1?0:(card.reps||0)+1,lastReview:now};
}
function previewIntervals(card){return[1,2,3,4].map(r=>fmtDays(nextFSRS(card,r).interval));}
function fmtDays(d){
  if(d===0)return"<10m";if(d===1)return"1d";
  if(d<30)return`${d}d`;if(d<365)return`${Math.round(d/30)}mo`;
  return`${(d/365).toFixed(1)}y`;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── Study plan ────────────────────────────────────────────────────────────────
function calcDailyNewCap(examDate){
  if(!examDate)return 15;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  const totalDays=Math.max(1,Math.round((exam-today)/86400000));
  const activeDays=Math.max(1,totalDays-NEW_CARDS_CUTOFF_DAYS);
  return Math.max(5,Math.min(30,Math.ceil(998/activeDays)));
}
function daysUntilExam(examDate){
  if(!examDate)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const exam=new Date(examDate);exam.setHours(0,0,0,0);
  return Math.round((exam-today)/86400000);
}

function exportData(name,data){
  const blob=new Blob([JSON.stringify({profile:name,exportedAt:new Date().toISOString(),data},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mnn-backup-${name}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(onSuccess){
  const input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.data)onSuccess(parsed.data);
        else alert("Invalid backup file.");
      }catch{alert("Could not read file.");}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Review queue ──────────────────────────────────────────────────────────────
function buildQueue(){
  const{cardStates,settings}=state.profileData;
  const{selectedLessons,newCardCap,productionEnabled}=settings;
  const dirs=productionEnabled?["rec","pro"]:["rec"];
  const all=[];
  for(const lesson of [...selectedLessons].sort()){
    (RAW[lesson]||[]).forEach((card,idx)=>{
      dirs.forEach(dir=>{
        const key=cardKey(lesson,idx,dir);
        const st=cardStates[key]||{stability:0,difficulty:5,interval:0,reps:0,lastReview:0};
        all.push({...card,lesson,idx,key,dir,...st});
      });
    });
  }
  const newCards=shuffle(all.filter(c=>c.reps===0));
  const due=shuffle(all.filter(c=>c.reps>0));
  return[...due,...newCards.slice(0,newCardCap)];
}

          </div>`).join("")}

  document.getElementById("cardWrap").addEventListener("click",()=>{if(!state.flipped)setState({flipped:true});});
  document.querySelectorAll(".rating-btn").forEach(el=>{
    el.addEventListener("click",()=>handleRating(parseInt(el.dataset.rating)));
  });
}

function handleRating(rating){
  const{queue,queueIdx,sessionResults}=state;
  const card=queue[queueIdx];
  const next=nextFSRS(card,rating);
  updateCardState(card.key,next);
  logToday(card.reps===0,rating===1);
  const results=[...sessionResults,{card,rating}];
  let newQueue=[...queue];
  if(rating===1&&queueIdx<newQueue.length-1)
    newQueue.splice(Math.min(queueIdx+3,newQueue.length),0,{...card,...next});
  if(queueIdx+1>=newQueue.length){setState({screen:"summary",sessionResults:results,queue:newQueue});}
  else setState({queue:newQueue,queueIdx:queueIdx+1,flipped:false,sessionResults:results});
}

// keyboard shortcuts
document.addEventListener("keydown",e=>{
  if(state.screen!=="review")return;
  if(e.key===" "||e.key==="Enter"){e.preventDefault();if(!state.flipped)setState({flipped:true});}
  if(state.flipped){
    if(e.key==="1")handleRating(1);if(e.key==="2")handleRating(2);
    if(e.key==="3")handleRating(3);if(e.key==="4")handleRating(4);
  }
});

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(root){
  const{sessionResults}=state;
  const counts=[1,2,3,4].map(r=>sessionResults.filter(x=>x.rating===r).length);

  root.innerHTML=`

    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
      <div class="btn" id="selAll" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">All</div>
      <div class="btn" id="selNone" style="padding:4px 10px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);">None</div>
      ${displayLessons.map(l=>{
        const sel=settings.selectedLessons.includes(l);
        return`<div class="btn lesson-chip${sel?" sel":""}" data-lesson="${l}" style="padding:4px 12px;border-radius:4px;font-size:12px;background:${sel?"":"var(--surface2)"};border:1px solid ${sel?"":"var(--border)"};color:${sel?"":"var(--text2)"};">${l.replace("Lesson ","")}</div>`;
      }).join("")}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:1fr auto auto auto;padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;">
        <span>Lesson</span><span style="text-align:right;min-width:50px;">Cards</span><span style="text-align:right;min-width:50px;">Seen</span><span style="text-align:right;min-width:40px;">✓</span>
      </div>
      ${displayLessons.map((l,i)=>{
        const cards=RAW[l]||[];
        const sel=settings.selectedLessons.includes(l);
        const seen=cards.filter((_,idx)=>cardStates[cardKey(l,idx,"rec")]?.reps>0).length;
        return`<div class="deck-row btn" data-lesson="${l}" style="display:grid;grid-template-columns:1fr auto auto auto;padding:11px 14px;border-bottom:${i<displayLessons.length-1?"1px solid var(--border)":"none"};background:${sel?"rgba(77,157,224,0.05)":"transparent"};">
          <div style="display:flex;align-items:center;gap:8px;">

              ${sel?`<span style="color:#fff;font-size:10px;font-weight:700;">✓</span>`:""}

          </div>

          <span style="font-size:12px;text-align:right;min-width:40px;align-self:center;color:${sel?"var(--accent)":"var(--text3)"};">${sel?"✓":"—"}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function attachDeckBrowserEvents(displayLessons,settings){
  document.querySelectorAll(".filter-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({filterBook:el.dataset.filter}));
  });
  document.getElementById("selAll")?.addEventListener("click",()=>{
    const next=[...new Set([...settings.selectedLessons,...displayLessons])];
    updateSettings({selectedLessons:next});
  });
  document.getElementById("selNone")?.addEventListener("click",()=>{
    const next=settings.selectedLessons.filter(l=>!displayLessons.includes(l));
    if(next.length>0)updateSettings({selectedLessons:next});
  });
  document.querySelectorAll(".lesson-chip[data-lesson],.deck-row[data-lesson]").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      const l=el.dataset.lesson;
      const sel=settings.selectedLessons.includes(l);
      const next=sel?settings.selectedLessons.filter(x=>x!==l):[...settings.selectedLessons,l];
      if(next.length>0)updateSettings({selectedLessons:next});
    });
  });
}

// ── Theme button helper ───────────────────────────────────────────────────────
function renderThemeBtn(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="theme-toggle" id="themeToggle_${containerId}">
      <span style="font-size:13px;">${isDark ? "🌙" : "☀️"}</span>
      <div class="theme-toggle-track" style="background:${isDark ? "#4d9de0" : "#ccc"};">
        <div class="theme-toggle-thumb" style="left:${isDark ? 19 : 3}px;"></div>
      </div>
    </div>`;
  document.getElementById(`themeToggle_${containerId}`).addEventListener('click', () => {
    isDark = !isDark;
    applyTheme();
    render();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
onFbReady(()=>render());
</script>

// ── FSRS-4.5 ──────────────────────────────────────────────────────────────────
const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0070,1.9395,0.1100,0.2900,2.2700,0.2500,2.9898,0.5100,0.8360];
const DECAY=-0.5, FACTOR=Math.pow(0.9,1/DECAY)-1;
function fsrsIS(r){return Math.max(W[r-1],0.1);}
function fsrsID(r){return Math.min(Math.max(W[4]-Math.exp(W[5]*(r-1))+1,1),10);}
function fsrsFC(e,s){return Math.pow(1+FACTOR*e/s,DECAY);}
function fsrsNS(d,s,r,rating){
  if(rating===1)return W[11]*Math.pow(d,-W[12])*(Math.pow(s+1,W[13])-1)*Math.exp(W[14]*(1-r));
  const hp=rating===2?W[15]:1,eb=rating===4?W[16]:1;
  return s*(Math.exp(W[8])*(11-d)*Math.pow(s,-W[9])*(Math.exp(W[10]*(1-r))-1)*hp*eb+1);
}
function fsrsND(d,rating){return Math.min(Math.max(d-W[6]*(rating-3)+W[7]*(W[4]-(d-W[6]*(rating-3))),1),10);}
function fsrsNI(s,ret=0.9){return Math.max(1,Math.round(s/FACTOR*(Math.pow(ret,1/DECAY)-1)));}
function nextFSRS(card,rating){
  const s0=card.stability,now=Date.now();
  if(!s0||card.reps===0){
    const stability=fsrsIS(rating),difficulty=fsrsID(rating);
    return{stability,difficulty,interval:rating===1?0:fsrsNI(stability),reps:rating===1?0:1,lastReview:now};
  }
  const elapsed=Math.max(0,(now-(card.lastReview||now))/86400000);
  const ret=fsrsFC(elapsed,s0);
  const newD=fsrsND(card.difficulty||5,rating),newS=fsrsNS(newD,s0,ret,rating);
  return{stability:Math.max(newS,0.1),difficulty:newD,interval:rating===1?0:fsrsNI(newS),reps:rating===1?0:(card.reps||0)+1,lastReview:now};
}
function previewIntervals(card){return[1,2,3,4].map(r=>fmtDays(nextFSRS(card,r).interval));}
function fmtDays(d){
  if(d===0)return"<10m";if(d===1)return"1d";
  if(d<30)return`${d}d`;if(d<365)return`${Math.round(d/30)}mo`;
  return`${(d/365).toFixed(1)}y`;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
